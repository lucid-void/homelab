<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physical Network Topology</title>
  <style>
    /* Catppuccin Macchiato */
    :root {
      --bg:        #24273a;
      --surface:   #1e2030;
      --surface1:  #363a4f;
      --overlay:   #6e738d;
      --text:      #cad3f5;
      --subtext:   #8087a2;
      --mauve:     #c6a0f6;
      --blue:      #8aadf4;
      --green:     #a6da95;
      --yellow:    #eed49f;
      --sapphire:  #7dc4e4;
      --pink:      #f5bde6;
      --red:       #ed8796;
      --peach:     #f5a97f;
    }

    @media (prefers-color-scheme: light) {
      /* Catppuccin Latte */
      :root {
        --bg:        #eff1f5;
        --surface:   #e6e9ef;
        --surface1:  #ccd0da;
        --overlay:   #7c7f93;
        --text:      #4c4f69;
        --subtext:   #6c6f85;
        --mauve:     #8839ef;
        --blue:      #1e66f5;
        --green:     #40a02b;
        --yellow:    #df8e1d;
        --sapphire:  #209fb5;
        --pink:      #ea76cb;
        --red:       #d20f39;
        --peach:     #fe640b;
      }
    }

    body {
      margin: 0;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    h2 {
      margin: 0 0 0.25rem;
      font-size: 1.2rem;
      color: var(--text);
    }

    .subtitle {
      margin: 0 0 1.5rem;
      font-size: 0.85rem;
      color: var(--subtext);
    }

    .diagram-wrap {
      max-width: 100%;
      overflow-x: auto;
    }

    svg {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h2>Physical Network Topology</h2>
  <p class="subtitle">SFP DAC for Proxmox · 10Gb PoE+ for NAS &amp; DGX · 1Gb PoE for Pi</p>

  <div class="diagram-wrap">
    <svg width="720" height="500" viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="monospace,sans-serif">

      <!-- INTERNET -->
      <ellipse cx="360" cy="36" rx="72" ry="22" fill="none" stroke="#6e738d" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="360" y="41" text-anchor="middle" font-size="12" fill="#8087a2">Internet / ISP</text>

      <!-- WAN line -->
      <line x1="360" y1="58" x2="360" y2="100" stroke="#6e738d" stroke-width="1.5" stroke-dasharray="5,3"/>

      <!-- UDM SE box -->
      <rect x="230" y="100" width="260" height="56" rx="8" fill="#1e2030" stroke="#8aadf4" stroke-width="2"/>
      <text x="360" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#8aadf4">UniFi UDM SE</text>
      <text x="360" y="140" text-anchor="middle" font-size="10" fill="#7dc4e4">Firewall / Router  ·  2× SFP</text>

      <!-- SFP uplink line -->
      <line x1="360" y1="156" x2="360" y2="205" stroke="#eed49f" stroke-width="2.5"/>
      <rect x="273" y="171" width="174" height="18" rx="3" fill="#363a4f"/>
      <text x="360" y="183" text-anchor="middle" font-size="10" fill="#eed49f">SFP ↔ SFP  (10Gb DAC uplink)</text>

      <!-- Switch box -->
      <rect x="100" y="205" width="520" height="64" rx="8" fill="#1e2030" stroke="#a6da95" stroke-width="2"/>
      <text x="360" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6da95">Core Switch</text>
      <text x="360" y="250" text-anchor="middle" font-size="10" fill="#a6da95">22× 2.5Gb PoE+  ·  2× 10Gb PoE+  ·  4× SFP  (1 SFP used for UDM uplink)</text>

      <!-- Drop lines -->
      <!-- Pi: 1Gb PoE -->
      <line x1="155" y1="269" x2="110" y2="345" stroke="#8087a2" stroke-width="1.5"/>
      <!-- TrueNAS: 10Gb PoE+ -->
      <line x1="270" y1="269" x2="255" y2="345" stroke="#f5a97f" stroke-width="2.5"/>
      <!-- Proxmox: 10Gb SFP DAC -->
      <line x1="450" y1="269" x2="465" y2="345" stroke="#eed49f" stroke-width="2.5"/>
      <!-- DGX Spark: 10Gb PoE+ -->
      <line x1="570" y1="269" x2="600" y2="345" stroke="#f5a97f" stroke-width="2.5"/>

      <!-- Port type labels on lines -->
      <text x="120" y="315" text-anchor="middle" font-size="9" fill="#8087a2">1Gb PoE</text>
      <text x="275" y="315" text-anchor="middle" font-size="9" fill="#f5a97f">10Gb PoE+</text>
      <text x="478" y="315" text-anchor="middle" font-size="9" fill="#eed49f">SFP DAC</text>
      <text x="598" y="315" text-anchor="middle" font-size="9" fill="#f5a97f">10Gb PoE+</text>

      <!-- Raspberry Pi -->
      <rect x="50" y="345" width="120" height="70" rx="6" fill="#24273a" stroke="#c6a0f6" stroke-width="1.5"/>
      <text x="110" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#c6a0f6">Raspberry Pi</text>
      <text x="110" y="381" text-anchor="middle" font-size="9" fill="#b7bdf8">172.16.20.1</text>
      <text x="110" y="394" text-anchor="middle" font-size="9" fill="#8087a2">1GbE PoE · physical</text>
      <text x="110" y="407" text-anchor="middle" font-size="9" fill="#8087a2">DNS primary · NTP</text>

      <!-- TrueNAS DXP4800 -->
      <rect x="193" y="345" width="124" height="70" rx="6" fill="#1e2030" stroke="#7dc4e4" stroke-width="1.5"/>
      <text x="255" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#7dc4e4">TrueNAS</text>
      <text x="255" y="379" text-anchor="middle" font-size="9" fill="#8aadf4">Ugreen DXP4800</text>
      <text x="255" y="393" text-anchor="middle" font-size="9" fill="#8087a2">172.16.20.2</text>
      <text x="255" y="407" text-anchor="middle" font-size="9" fill="#8087a2">3× 12TB + SSD cache</text>

      <!-- Proxmox MS-A2 -->
      <rect x="403" y="345" width="124" height="70" rx="6" fill="#1e2030" stroke="#ed8796" stroke-width="1.5"/>
      <text x="465" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#ed8796">Proxmox</text>
      <text x="465" y="379" text-anchor="middle" font-size="9" fill="#ed8796">Minisforum MS-A2</text>
      <text x="465" y="393" text-anchor="middle" font-size="9" fill="#8087a2">172.16.20.3</text>
      <text x="465" y="407" text-anchor="middle" font-size="9" fill="#8087a2">VMs / Containers</text>

      <!-- DGX Spark -->
      <rect x="543" y="345" width="130" height="70" rx="6" fill="#24273a" stroke="#f5bde6" stroke-width="2"/>
      <text x="608" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#f5bde6">NVIDIA DGX Spark</text>
      <text x="608" y="379" text-anchor="middle" font-size="9" fill="#f5bde6">AI Supercomputer</text>
      <text x="608" y="393" text-anchor="middle" font-size="9" fill="#8087a2">172.16.20.4</text>
      <text x="608" y="407" text-anchor="middle" font-size="9" fill="#8087a2">10GbE · WOL-gated</text>

      <!-- Legend -->
      <line x1="20" y1="466" x2="42" y2="466" stroke="#eed49f" stroke-width="2.5"/>
      <text x="50" y="470" font-size="10" fill="#8087a2">SFP DAC / fiber</text>
      <line x1="160" y1="466" x2="182" y2="466" stroke="#f5a97f" stroke-width="2.5"/>
      <text x="190" y="470" font-size="10" fill="#8087a2">10Gb PoE+</text>
      <line x1="280" y1="466" x2="302" y2="466" stroke="#8087a2" stroke-width="1.5"/>
      <text x="310" y="470" font-size="10" fill="#8087a2">1Gb PoE</text>
      <line x1="370" y1="460" x2="392" y2="460" stroke="#6e738d" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="400" y="464" font-size="10" fill="#8087a2">WAN</text>

    </svg>
  </div>
</body>
</html>
