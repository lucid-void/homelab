<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Topology</title>
  <style>
    /* Catppuccin Macchiato */
    :root {
      --bg:        #24273a;
      --surface:   #1e2030;
      --surface1:  #363a4f;
      --overlay:   #6e738d;
      --text:      #cad3f5;
      --subtext:   #8087a2;
      --mauve:     #c6a0f6;
      --blue:      #8aadf4;
      --green:     #a6da95;
      --yellow:    #eed49f;
      --sapphire:  #7dc4e4;
      --pink:      #f5bde6;
      --red:       #ed8796;
      --peach:     #f5a97f;
    }

    @media (prefers-color-scheme: light) {
      /* Catppuccin Latte */
      :root {
        --bg:        #eff1f5;
        --surface:   #e6e9ef;
        --surface1:  #ccd0da;
        --overlay:   #7c7f93;
        --text:      #4c4f69;
        --subtext:   #6c6f85;
        --mauve:     #8839ef;
        --blue:      #1e66f5;
        --green:     #40a02b;
        --yellow:    #df8e1d;
        --sapphire:  #209fb5;
        --pink:      #ea76cb;
        --red:       #d20f39;
        --peach:     #fe640b;
      }
    }

    body {
      margin: 0;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    h2 {
      margin: 0 0 0.25rem;
      font-size: 1.2rem;
      color: var(--text);
    }

    .subtitle {
      margin: 0 0 1.5rem;
      font-size: 0.85rem;
      color: var(--subtext);
    }

    .diagram-wrap {
      max-width: 100%;
      overflow-x: auto;
    }

    svg {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h2>Network Topology</h2>
  <p class="subtitle">172.16.20.0/24 homelab VLAN · Proxmox VMs provisioned via OpenTofu + Packer · Services VM (.13) is Swarm manager</p>
