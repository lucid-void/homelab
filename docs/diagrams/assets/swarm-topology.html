<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Swarm Topology</title>
  <style>
    /* Catppuccin Macchiato */
    :root {
      --bg:        #24273a;
      --surface:   #1e2030;
      --surface1:  #363a4f;
      --overlay:   #6e738d;
      --text:      #cad3f5;
      --subtext:   #8087a2;
      --mauve:     #c6a0f6;
      --blue:      #8aadf4;
      --green:     #a6da95;
      --yellow:    #eed49f;
      --sapphire:  #7dc4e4;
      --pink:      #f5bde6;
      --red:       #ed8796;
    }

    @media (prefers-color-scheme: light) {
      /* Catppuccin Latte */
      :root {
        --bg:        #eff1f5;
        --surface:   #e6e9ef;
        --surface1:  #ccd0da;
        --overlay:   #7c7f93;
        --text:      #4c4f69;
        --subtext:   #6c6f85;
        --mauve:     #8839ef;
        --blue:      #1e66f5;
        --green:     #40a02b;
        --yellow:    #df8e1d;
        --sapphire:  #209fb5;
        --pink:      #ea76cb;
        --red:       #d20f39;
      }
    }

    body {
      margin: 0;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    h2 {
      margin: 0 0 0.25rem;
      font-size: 1.2rem;
      color: var(--text);
    }

    .subtitle {
      margin: 0 0 1rem;
      font-size: 0.85rem;
      color: var(--subtext);
    }

    .diagram-wrap {
      max-width: 100%;
      overflow-x: auto;
    }

    svg {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h2>Docker Swarm Topology &amp; Service Placement</h2>
  <p class="subtitle">172.16.20.0/24 · Services VM (.13) is Swarm manager · Valkey replaces Redis everywhere</p>

  <div class="diagram-wrap">
    <svg width="920" height="760" viewBox="0 0 920 760" xmlns="http://www.w3.org/2000/svg" font-family="monospace,sans-serif" font-size="10">

      <!-- SWARM OVERLAY -->
      <rect x="12" y="128" width="510" height="620" rx="14" fill="#1e2030" stroke="#8aadf4" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.45"/>
      <text x="267" y="148" text-anchor="middle" font-size="11" fill="#8aadf4" opacity="0.8">Docker Swarm Overlay Network  (ingress mesh)</text>

      <!-- DGX in swarm -->
      <rect x="630" y="128" width="270" height="180" rx="14" fill="#1e2030" stroke="#8aadf4" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.45"/>

      <!-- PHYSICAL NODES -->

      <!-- Pi .1 -->
      <rect x="22" y="158" width="148" height="108" rx="8" fill="#24273a" stroke="#c6a0f6" stroke-width="1.5"/>
      <text x="96" y="175" text-anchor="middle" font-weight="bold" fill="#c6a0f6">Raspberry Pi</text>
      <text x="96" y="189" text-anchor="middle" fill="#8087a2">172.16.20.1 · physical</text>
      <rect x="34" y="195" width="124" height="13" rx="3" fill="#363a4f"/>
      <text x="96" y="205" text-anchor="middle" fill="#c6a0f6">⬡ Swarm Worker</text>
      <text x="96" y="221" text-anchor="middle" fill="#a5adcb">Technitium DNS (primary)</text>
      <text x="96" y="235" text-anchor="middle" fill="#a5adcb">NTP · chrony</text>
      <text x="96" y="250" text-anchor="middle" fill="#8087a2">1GbE PoE</text>

      <!-- TrueNAS .2 -->
      <rect x="182" y="158" width="148" height="108" rx="8" fill="#1e2030" stroke="#7dc4e4" stroke-width="2"/>
      <text x="256" y="175" text-anchor="middle" font-weight="bold" fill="#7dc4e4">TrueNAS</text>
      <text x="256" y="189" text-anchor="middle" fill="#8087a2">172.16.20.2 · physical</text>
      <rect x="194" y="195" width="124" height="13" rx="3" fill="#363a4f"/>
      <text x="256" y="205" text-anchor="middle" fill="#7dc4e4">Storage Only</text>
      <text x="256" y="221" text-anchor="middle" fill="#a5adcb">Postgres · MariaDB</text>
      <text x="256" y="235" text-anchor="middle" fill="#a5adcb">NFS shares · S3</text>
      <text x="256" y="250" text-anchor="middle" fill="#8087a2">10GbE · Cloudflare ACME</text>

      <!-- DGX .4 -->
      <rect x="640" y="158" width="250" height="120" rx="8" fill="#24273a" stroke="#f5bde6" stroke-width="2"/>
      <text x="765" y="175" text-anchor="middle" font-weight="bold" fill="#f5bde6">NVIDIA DGX Spark</text>
      <text x="765" y="189" text-anchor="middle" fill="#8087a2">172.16.20.4 · physical · WOL</text>
      <rect x="652" y="195" width="226" height="13" rx="3" fill="#363a4f"/>
      <text x="765" y="205" text-anchor="middle" fill="#f5bde6">⬡ Swarm Worker (GPU node)</text>
      <text x="765" y="221" text-anchor="middle" fill="#a5adcb">ollama · vllm · openwebui</text>
      <text x="765" y="235" text-anchor="middle" fill="#a5adcb">langfuse · qdrant · searxng</text>
      <text x="765" y="249" text-anchor="middle" fill="#a5adcb">cortex stack · obsidian-pipelines</text>
      <text x="765" y="263" text-anchor="middle" fill="#f5bde6" font-size="9">constraint: node.hostname == dgx</text>

      <!-- PROXMOX BOX -->
      <rect x="22" y="292" width="500" height="450" rx="10" fill="#1e2030" stroke="#ed8796" stroke-width="1.5" opacity="0.55"/>
      <text x="272" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#ed8796">Proxmox MS-A2 · 172.16.20.3</text>

      <!-- PBS .10 — NOT in swarm -->
      <rect x="34" y="318" width="145" height="88" rx="6" fill="#1e2030" stroke="#ed8796" stroke-width="1.5"/>
      <text x="107" y="334" text-anchor="middle" font-weight="bold" fill="#ed8796">PBS VM</text>
      <text x="107" y="347" text-anchor="middle" fill="#8087a2">172.16.20.10</text>
      <rect x="46" y="353" width="122" height="13" rx="3" fill="#363a4f"/>
      <text x="107" y="363" text-anchor="middle" fill="#ed8796">NOT in Swarm</text>
      <text x="107" y="378" text-anchor="middle" fill="#a5adcb">Proxmox Backup Server</text>
      <text x="107" y="391" text-anchor="middle" fill="#8087a2">datastore → TrueNAS NFS</text>
      <text x="107" y="400" text-anchor="middle" fill="#6e738d">Debian VM · Ansible managed</text>

      <!-- DNS/NTP VM .11 -->
      <rect x="192" y="318" width="145" height="88" rx="6" fill="#24273a" stroke="#c6a0f6" stroke-width="1"/>
      <text x="265" y="334" text-anchor="middle" font-weight="bold" fill="#c6a0f6">DNS/NTP VM</text>
      <text x="265" y="347" text-anchor="middle" fill="#8087a2">172.16.20.11</text>
      <rect x="204" y="353" width="122" height="13" rx="3" fill="#363a4f"/>
      <text x="265" y="363" text-anchor="middle" fill="#c6a0f6">⬡ Swarm Worker</text>
      <text x="265" y="378" text-anchor="middle" fill="#a5adcb">Technitium (secondary)</text>
      <text x="265" y="391" text-anchor="middle" fill="#a5adcb">zone xfer ← Pi (.1)</text>
      <text x="265" y="400" text-anchor="middle" fill="#8087a2">NTP · failover DNS</text>

      <!-- Media VM .12 -->
      <rect x="350" y="318" width="148" height="105" rx="6" fill="#24273a" stroke="#eed49f" stroke-width="1.5"/>
      <text x="424" y="334" text-anchor="middle" font-weight="bold" fill="#eed49f">Media VM</text>
      <text x="424" y="347" text-anchor="middle" fill="#8087a2">172.16.20.12</text>
      <rect x="362" y="353" width="124" height="13" rx="3" fill="#363a4f"/>
      <text x="424" y="363" text-anchor="middle" fill="#eed49f">⬡ Swarm Worker</text>
      <text x="424" y="378" text-anchor="middle" fill="#a5adcb">plex · sabnzbd</text>
      <text x="424" y="391" text-anchor="middle" fill="#a5adcb">sonarr · radarr · prowlarr</text>
      <text x="424" y="404" text-anchor="middle" fill="#a5adcb">qbittorrent · flaresolverr</text>
      <text x="424" y="417" text-anchor="middle" fill="#eed49f" font-size="9">constraint: node == media</text>

      <!-- Services VM .13 — MANAGER -->
      <rect x="34" y="424" width="145" height="185" rx="6" fill="#1e2030" stroke="#a6da95" stroke-width="2"/>
      <text x="107" y="441" text-anchor="middle" font-weight="bold" fill="#a6da95">Services VM</text>
      <text x="107" y="454" text-anchor="middle" fill="#8087a2">172.16.20.13</text>
      <rect x="46" y="460" width="122" height="13" rx="3" fill="#363a4f"/>
      <text x="107" y="470" text-anchor="middle" fill="#a6da95">★ Swarm Manager</text>
      <text x="107" y="486" text-anchor="middle" fill="#a5adcb">traefik (reverse proxy)</text>
      <text x="107" y="499" text-anchor="middle" fill="#a5adcb">paperless + gotenberg + tika</text>
      <text x="107" y="512" text-anchor="middle" fill="#a5adcb">paperless-broker (Valkey)</text>
      <text x="107" y="525" text-anchor="middle" fill="#a5adcb">immich + ML (CPU)</text>
      <text x="107" y="538" text-anchor="middle" fill="#a5adcb">immich-valkey (cache)</text>
      <text x="107" y="551" text-anchor="middle" fill="#a5adcb">n8n · reactive-resume</text>
      <text x="107" y="564" text-anchor="middle" fill="#a5adcb">homebox · gotify · dockge</text>
      <text x="107" y="577" text-anchor="middle" fill="#a5adcb">it-tools · homelab-hub</text>
      <text x="107" y="590" text-anchor="middle" fill="#8087a2" font-size="9">constraint: node == services</text>
      <text x="107" y="601" text-anchor="middle" fill="#6e738d" font-size="9">manager down → services stay up</text>

      <!-- Game VM .14 -->
      <rect x="192" y="424" width="145" height="115" rx="6" fill="#24273a" stroke="#eed49f" stroke-width="1.5"/>
      <text x="265" y="441" text-anchor="middle" font-weight="bold" fill="#eed49f">Game VM</text>
      <text x="265" y="454" text-anchor="middle" fill="#8087a2">172.16.20.14</text>
      <rect x="204" y="460" width="122" height="13" rx="3" fill="#363a4f"/>
      <text x="265" y="470" text-anchor="middle" fill="#eed49f">⬡ Swarm Worker</text>
      <text x="265" y="486" text-anchor="middle" fill="#a5adcb">satisfactory-server</text>
      <text x="265" y="500" text-anchor="middle" fill="#a5adcb">netbird</text>
      <text x="265" y="514" text-anchor="middle" fill="#a5adcb">zerotier</text>
      <text x="265" y="528" text-anchor="middle" fill="#eed49f" font-size="9">netbird/zt: --network host</text>
      <text x="265" y="533" text-anchor="middle" fill="#6e738d" font-size="9"> (outside Swarm scheduling)</text>

      <!-- Lab VM .15 -->
      <rect x="350" y="440" width="148" height="88" rx="6" fill="#24273a" stroke="#8087a2" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="424" y="457" text-anchor="middle" font-weight="bold" fill="#8087a2">Lab VM</text>
      <text x="424" y="470" text-anchor="middle" fill="#8087a2">172.16.20.15</text>
      <rect x="362" y="476" width="124" height="13" rx="3" fill="#363a4f"/>
      <text x="424" y="486" text-anchor="middle" fill="#8087a2">⬡ Swarm Worker</text>
      <text x="424" y="501" text-anchor="middle" fill="#6e738d">testing · staging</text>
      <text x="424" y="514" text-anchor="middle" fill="#6e738d">ephemeral workloads</text>
      <text x="424" y="522" text-anchor="middle" fill="#6e738d">rebuild freely</text>

      <!-- NFS CONNECTIONS -->
      <line x1="256" y1="266" x2="107" y2="318" stroke="#7dc4e4" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="256" y1="266" x2="424" y2="318" stroke="#7dc4e4" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="256" y1="266" x2="107" y2="424" stroke="#7dc4e4" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
      <text x="150" y="290" text-anchor="middle" font-size="9" fill="#7dc4e4" opacity="0.7">NFS mounts</text>

      <!-- Technitium zone transfer -->
      <line x1="170" y1="228" x2="265" y2="318" stroke="#c6a0f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="240" y="285" text-anchor="middle" font-size="8" fill="#c6a0f6" opacity="0.7">zone xfer</text>

      <!-- IP TABLE -->
      <rect x="640" y="320" width="260" height="240" rx="8" fill="#1e2030" stroke="#363a4f" stroke-width="1"/>
      <text x="770" y="338" text-anchor="middle" font-weight="bold" fill="#6e738d">IP Allocation  ·  172.16.20.x</text>
      <line x1="648" y1="344" x2="892" y2="344" stroke="#363a4f" stroke-width="1"/>
      <text x="770" y="358" text-anchor="middle" fill="#8087a2">.1   Pi (physical)</text>
      <text x="770" y="371" text-anchor="middle" fill="#8087a2">.2   TrueNAS (physical)</text>
      <text x="770" y="384" text-anchor="middle" fill="#8087a2">.3   Proxmox (physical)</text>
      <text x="770" y="397" text-anchor="middle" fill="#8087a2">.4   DGX Spark (physical)</text>
      <text x="770" y="412" text-anchor="middle" fill="#6e738d">.5 – .9   reserved physical</text>
      <line x1="648" y1="418" x2="892" y2="418" stroke="#363a4f" stroke-width="1"/>
      <text x="770" y="432" text-anchor="middle" fill="#ed8796">.10  PBS VM  (no Swarm)</text>
      <text x="770" y="445" text-anchor="middle" fill="#8087a2">.11  DNS/NTP VM</text>
      <text x="770" y="458" text-anchor="middle" fill="#8087a2">.12  Media VM</text>
      <text x="770" y="471" text-anchor="middle" fill="#a6da95">.13  Services VM  ★ mgr</text>
      <text x="770" y="484" text-anchor="middle" fill="#8087a2">.14  Game VM</text>
      <text x="770" y="497" text-anchor="middle" fill="#8087a2">.15  Lab VM</text>
      <text x="770" y="510" text-anchor="middle" fill="#8087a2">.16  Monitoring VM</text>
      <text x="770" y="526" text-anchor="middle" fill="#6e738d">.17+  future VMs</text>
      <text x="770" y="541" text-anchor="middle" fill="#6e738d">10.0.x.x  Swarm overlay</text>

      <!-- VALKEY NOTE -->
      <rect x="640" y="575" width="260" height="90" rx="8" fill="#1e2030" stroke="#363a4f" stroke-width="1"/>
      <text x="770" y="593" text-anchor="middle" font-weight="bold" fill="#6e738d">Cache / Broker</text>
      <line x1="648" y1="598" x2="892" y2="598" stroke="#363a4f" stroke-width="1"/>
      <text x="770" y="614" text-anchor="middle" fill="#8087a2">Valkey (Redis-compatible)</text>
      <text x="770" y="628" text-anchor="middle" fill="#6e738d">paperless-broker  ·  immich cache</text>
      <text x="770" y="642" text-anchor="middle" fill="#6e738d">co-located on Services VM</text>
      <text x="770" y="656" text-anchor="middle" fill="#6e738d">ephemeral — no persistent data</text>

      <!-- LEGEND -->
      <rect x="640" y="680" width="260" height="70" rx="8" fill="#1e2030" stroke="#363a4f" stroke-width="1"/>
      <text x="770" y="697" text-anchor="middle" font-weight="bold" fill="#6e738d">Legend</text>
      <rect x="652" y="704" width="10" height="10" rx="2" fill="none" stroke="#8aadf4" stroke-dasharray="4,2" stroke-width="1.5"/>
      <text x="672" y="714" fill="#8087a2">Swarm overlay boundary</text>
      <text x="652" y="730" fill="#a6da95">★</text><text x="672" y="730" fill="#8087a2">Swarm manager</text>
      <text x="652" y="744" fill="#a5adcb">⬡</text><text x="672" y="744" fill="#8087a2">Swarm worker node</text>

    </svg>
  </div>
