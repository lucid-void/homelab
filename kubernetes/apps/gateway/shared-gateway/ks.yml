---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shared-gateway
  namespace: flux-system
spec:
  targetNamespace: gateway
  commonMetadata:
    labels:
      app.kubernetes.io/name: shared-gateway
  dependsOn:
    - name: cert-manager-config
    - name: gateway-api-config
    - name: cilium
  path: ./kubernetes/apps/gateway/shared-gateway/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  timeout: 5m
