---
# Global HTTP → HTTPS redirect for all *.blackcats.cc — no per-app redirect needed
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-http-to-https
  namespace: gateway
spec:
  parentRefs:
    - name: shared
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
