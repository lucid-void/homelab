---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gitea
  namespace: flux-system
spec:
  targetNamespace: gitea
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: gitea-database
    - name: shared-gateway
    - name: sealed-secrets
    - name: zitadel-bootstrap
  path: ./kubernetes/apps/gitea/gitea/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false
  interval: 30m
  timeout: 10m
