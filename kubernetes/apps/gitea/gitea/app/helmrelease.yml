---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 30m
  chart:
    spec:
      chart: gitea
      version: "12.7.0"
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: gitea-helm-values
      valuesKey: values.yaml
    - kind: Secret
      name: gitea-oidc-secret
      valuesKey: values.yaml
  values:
    # Disable bundled databases and cache
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis-cluster:
      enabled: false

    persistence:
      enabled: true
      existingClaim: gitea-data

    ingress:
      enabled: false

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi

    extraEnvFrom:
      - secretRef:
          name: gitea-db-env

    gitea:
      admin:
        username: void
        email: mxmclaeys@gmail.com
        passwordMode: initialOnlyNoReset

      config:
        database:
          DB_TYPE: postgres
          HOST: postgres-rw.postgres.svc.cluster.local:5432
          NAME: gitea
          USER: gitea

        server:
          DOMAIN: gitea.blackcats.cc
          ROOT_URL: https://gitea.blackcats.cc/
          SSH_DOMAIN: gitea.blackcats.cc
          LFS_START_SERVER: true

        cache:
          ADAPTER: memory

        session:
          PROVIDER: memory

        queue:
          TYPE: channel

        service:
          DISABLE_REGISTRATION: false
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false

        log:
          LEVEL: warn
