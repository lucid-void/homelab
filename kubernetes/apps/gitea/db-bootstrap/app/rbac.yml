---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-db-bootstrap
  namespace: gitea
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-db-bootstrap
  namespace: gitea
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-db-bootstrap
  namespace: gitea
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-db-bootstrap
subjects:
  - kind: ServiceAccount
    name: gitea-db-bootstrap
    namespace: gitea
