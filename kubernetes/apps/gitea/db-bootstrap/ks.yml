---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gitea-db-bootstrap
  namespace: flux-system
spec:
  targetNamespace: gitea
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: gitea-database
    - name: reflector
  path: ./kubernetes/apps/gitea/db-bootstrap/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  timeout: 5m
