---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      server:
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v1.132.3
            env:
              DB_HOSTNAME: postgres-rw.postgres.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              DB_USERNAME: immich
              DB_VECTOR_EXTENSION: pgvector
              REDIS_HOSTNAME: immich-valkey
              REDIS_PORT: "6379"
              MACHINE_LEARNING_URL: http://immich-machine-learning:3003
              UPLOAD_LOCATION: /usr/src/app/upload
              IMMICH_LOG_LEVEL: log
              IMMICH_CONFIG_FILE: /immich-config/immich.json
            envFrom:
              - secretRef:
                  name: immich-app-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                memory: 512Mi
                cpu: 100m
              limits:
                memory: 4Gi

      machine-learning:
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v1.132.3
            env:
              MACHINE_LEARNING_CACHE_FOLDER: /cache
            resources:
              requests:
                memory: 512Mi
                cpu: 100m
              limits:
                memory: 4Gi

      valkey:
        containers:
          app:
            image:
              repository: valkey/valkey
              tag: 8-alpine
            resources:
              requests:
                memory: 64Mi
                cpu: 10m
              limits:
                memory: 256Mi

    service:
      server:
        controller: server
        ports:
          http:
            port: 2283
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003
      valkey:
        controller: valkey
        ports:
          redis:
            port: 6379

    persistence:
      library:
        existingClaim: immich-library
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/upload
      model-cache:
        existingClaim: immich-model-cache
        advancedMounts:
          machine-learning:
            app:
              - path: /cache
      oidc-config:
        type: secret
        name: immich-oidc-config
        defaultMode: 0440
        advancedMounts:
          server:
            app:
              - path: /immich-config
                readOnly: true
