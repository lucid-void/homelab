---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 2
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgres-cnpg-immich
    major: 17

  bootstrap:
    initdb:
      database: app
      owner: app

  postgresql:
    shared_preload_libraries:
      - vectors.so
      - vchord.so
    parameters:
      max_connections: "200"

  managed:
    roles:
      - name: immich
        login: true
        inherit: true
        passwordSecret:
          name: immich-role-secret

  storage:
    size: 20Gi
    storageClass: nfs-client
