---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 2
  enableSuperuserAccess: true
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgres-cnpg-immich
    major: 17

  bootstrap:
    initdb:
      database: app
      owner: app

  postgresql:
    shared_preload_libraries:
      - vectors.so
      - vchord.so
    parameters:
      max_connections: "200"

  # Sized off observed usage (postgres-1 ~1.0Gi, postgres-2 ~1.4Gi working set incl.
  # page cache; CPU near-idle with bursts on vector-index builds). Memory request is
  # set above steady-state usage so Postgres is never a low-priority eviction target
  # when a leaky neighbour pressures the node — this DB gates all OIDC auth.
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 2Gi

  managed:
    roles:
      - name: immich
        login: true
        inherit: true
        passwordSecret:
          name: immich-role-secret
      - name: zitadel
        login: true
        inherit: true
        createrole: true
        createdb: true
        passwordSecret:
          name: zitadel-role-secret
      - name: freshrss
        login: true
        inherit: true
        passwordSecret:
          name: freshrss-role-secret
      - name: paperless
        login: true
        inherit: true
        passwordSecret:
          name: paperless-role-secret
      - name: gitea
        login: true
        inherit: true
        passwordSecret:
          name: gitea-role-secret
      - name: radarr
        login: true
        inherit: true
        passwordSecret:
          name: radarr-role-secret
      - name: sonarr
        login: true
        inherit: true
        passwordSecret:
          name: sonarr-role-secret
      - name: romm
        login: true
        inherit: true
        passwordSecret:
          name: romm-role-secret

  storage:
    size: 20Gi
    storageClass: nfs-client
