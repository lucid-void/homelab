---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 2
  imageName: ghcr.io/lucid-void/postgres-cnpg-immich:17-bookworm-vectorchord1.1.1-pgvector0.8.2

  bootstrap:
    initdb:
      database: app
      owner: app

  postgresql:
    shared_preload_libraries:
      - vchord.so
    parameters:
      max_connections: "200"

  storage:
    size: 20Gi
    storageClass: nfs-client
