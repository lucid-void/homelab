---
# Add a database name here when deploying a new service that uses the shared postgres cluster.
# The backup CronJob dumps each listed database to a separate file in one restic snapshot.
# Excluded (each has its own quiesced backup CronJob that captures DB + data volume together):
#   immich    → immich-backup
#   paperless → paperless-backup
#   gitea     → gitea-backup
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-backup-databases
  namespace: postgres
data:
  databases: |
    zitadel
    freshrss
    radarr
    sonarr
