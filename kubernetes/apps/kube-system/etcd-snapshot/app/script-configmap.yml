---
apiVersion: v1
kind: ConfigMap
metadata:
  name: etcd-snapshot-script
  namespace: kube-system
data:
  backup.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    SNAPSHOT=/tmp/etcd.snap
    LOG=/tmp/backup.log
    # Keep in sync with the Talos version in talos/talconfig.yaml
    TALOS_VERSION=v1.13.2
    exec > >(tee "$LOG") 2>&1

    notify_gotify() {
      local title="$1" msg="$2" priority="${3:-5}"
      curl -sf -X POST "https://gotify.blackcats.cc/message" \
        -H "Content-Type: application/json" \
        -H "X-Gotify-Key: ${GOTIFY_TOKEN}" \
        -d "{\"title\":\"${title}\",\"message\":\"${msg}\",\"priority\":${priority}}" \
        >/dev/null || true
    }

    cleanup() {
      local exit_code=$?
      if [[ ${exit_code} -eq 0 ]]; then
        notify_gotify "Backup: etcd-snapshot ✓" "Completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      else
        local tail_log
        tail_log=$(tail -10 "$LOG" 2>/dev/null | awk '{gsub(/\\/, "\\\\"); gsub(/"/, "\\\""); printf "%s\\n", $0}')
        notify_gotify "Backup: etcd-snapshot ✗" "Exit ${exit_code} at $(date -u +%Y-%m-%dT%H:%M:%SZ)\n\n${tail_log}" 8
      fi
    }
    trap cleanup EXIT

    echo "[backup] Starting at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

    # 1. Download talosctl — must match cluster Talos version
    echo "[backup] Downloading talosctl ${TALOS_VERSION}..."
    curl -sfL \
      "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64" \
      -o /tmp/talosctl
    chmod +x /tmp/talosctl

    # 2. Take etcd snapshot — try each control plane in order until one succeeds.
    #    A single-node failure keeps etcd quorum so at least two nodes are always reachable.
    echo "[backup] Taking etcd snapshot..."
    SNAPSHOT_DONE=false
    for node in 172.16.20.20 172.16.20.21 172.16.20.22; do
      echo "[backup] Trying node ${node}..."
      if /tmp/talosctl --talosconfig /talosconfig/config \
          --nodes "${node}" etcd snapshot "${SNAPSHOT}" 2>&1; then
        echo "[backup] Snapshot taken from ${node}: $(du -sh ${SNAPSHOT} | cut -f1)"
        SNAPSHOT_DONE=true
        break
      fi
      echo "[backup] Node ${node} failed, trying next..."
    done
    [[ "${SNAPSHOT_DONE}" == "true" ]] || { echo "[backup] ERROR: etcd snapshot failed on all nodes"; exit 1; }

    # 3. Init restic repo on Filen if this is the first run
    if ! restic cat config &>/dev/null; then
      echo "[backup] Initialising restic repository..."
      restic init
    fi

    # 4. Upload snapshot to Filen via restic (content-addressed — only changed chunks uploaded)
    echo "[backup] Running restic backup..."
    restic backup "${SNAPSHOT}" \
      --tag "$(date +%Y-%m-%d)" \
      --tag etcd-snapshot \
      --verbose

    # 5. Forget old snapshots (keep 30 daily) and prune orphaned pack files
    echo "[backup] Pruning old snapshots..."
    restic forget --keep-daily 30 --prune

    # 6. Spot-check repository integrity
    echo "[backup] Checking repository integrity..."
    restic check --read-data-subset=1/10

    echo "[backup] Done at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    # trap fires here → notify Gotify
