---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-snapshot
  namespace: kube-system
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: etcd-snapshot
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
          volumes:
            - name: rclone-config
              secret:
                secretName: rclone-secret
                defaultMode: 0440
            - name: talosconfig
              secret:
                secretName: talosconfig-secret
                defaultMode: 0440
            - name: script
              configMap:
                name: etcd-snapshot-script
                defaultMode: 0755
          containers:
            - name: backup
              image: ghcr.io/lucid-void/backup-tools:v1.0.2
              command: ["/bin/bash", "/scripts/backup.sh"]
              envFrom:
                - secretRef:
                    name: restic-secret
                - secretRef:
                    name: gotify-secret
                    optional: true
              env:
                - name: RCLONE_CONFIG
                  value: /rclone-config/rclone.conf
              volumeMounts:
                - name: rclone-config
                  mountPath: /rclone-config
                  readOnly: true
                - name: talosconfig
                  mountPath: /talosconfig
                  readOnly: true
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 512Mi
