---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: 1.19.6
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: cilium-helm-values
  values:
    hubble:
      enabled: true
      metrics:
        enabled:
          - dns:query
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
        serviceMonitor:
          enabled: false
        dashboards:
          enabled: false
      relay:
        enabled: true
        rollOutPods: true
        prometheus:
          serviceMonitor:
            enabled: false
      ui:
        enabled: true
        rollOutPods: true
        ingress:
          enabled: true
          className: internal
          hosts: ["hubble.${CLUSTER_DOMAIN}"]
          annotations:
            kubernetes.io/ingress.class: "internal"
            cert-manager.io/cluster-issuer: "letsencrypt-production"
            external-dns.alpha.kubernetes.io/hostname: "hubble.${CLUSTER_DOMAIN}"
            external-dns.alpha.kubernetes.io/ttl: "120" #optional
          tls:
            - hosts:
                - "hubble.${CLUSTER_DOMAIN}"
              secretName: hubble-ui-tls
    operator:
      prometheus:
        enabled: false
        serviceMonitor:
          enabled: false
    prometheus:
      enabled: false
      serviceMonitor:
        enabled: false