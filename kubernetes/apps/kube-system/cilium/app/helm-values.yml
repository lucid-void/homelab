---
kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

# Jumbo frames. The Talos node NICs are provisioned at MTU 9000 (infra/terraform/
# kubernetes.tf); pin Cilium's datapath MTU to match instead of relying on
# auto-detection. Cilium subtracts tunnel + WireGuard overhead automatically for
# the pod/tunnel interfaces. Requires a cilium agent restart + pod recreation to
# take effect on existing workloads.
MTU: 9000

ipam:
  mode: kubernetes

encryption:
  enabled: true
  type: wireguard

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

l2announcements:
  enabled: true

gatewayAPI:
  enabled: true
  enableAppProtocol: true
  # Advertise ALPN (h2, http/1.1) on Gateway TLS listeners. Without this the Envoy
  # listener negotiates no ALPN protocol, so strict clients fail the handshake:
  # gRPC (h2-required) and proxmox-openid's token-endpoint call both break, while
  # tolerant clients like curl silently fall back to HTTP/1.1. See design/AI_CONTEXT.md.
  enableAlpn: true

operator:
  replicas: 1
  prometheus:
    enabled: false
    serviceMonitor:
      enabled: false

prometheus:
  enabled: false
  serviceMonitor:
    enabled: false
