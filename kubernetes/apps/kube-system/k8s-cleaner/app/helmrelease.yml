---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-cleaner
spec:
  interval: 30m
  chart:
    spec:
      chart: k8s-cleaner
      version: "0.20.0"
      sourceRef:
        kind: HelmRepository
        name: k8s-cleaner
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
