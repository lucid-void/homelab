---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-backup-script
  namespace: paperless
data:
  backup.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    NAMESPACE=paperless
    DEPLOYMENT=paperless-app
    DB_DUMP=/db/paperless.pgdump
    LOG=/tmp/backup.log
    exec > >(tee "$LOG") 2>&1

    notify_gotify() {
      local title="$1" msg="$2" priority="${3:-5}"
      curl -sf -X POST "https://gotify.blackcats.cc/message" \
        -H "Content-Type: application/json" \
        -H "X-Gotify-Key: ${GOTIFY_TOKEN}" \
        -d "{\"title\":\"${title}\",\"message\":\"${msg}\",\"priority\":${priority}}" \
        >/dev/null || true
    }

    cleanup() {
      local exit_code=$?
      echo "[backup] Scaling ${DEPLOYMENT} back to 1 replica..."
      kubectl scale deployment/${DEPLOYMENT} -n ${NAMESPACE} --replicas=1 || true
      if [[ ${exit_code} -eq 0 ]]; then
        notify_gotify "Backup: paperless ✓" "Completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      else
        local tail_log
        tail_log=$(tail -10 "$LOG" 2>/dev/null | awk '{gsub(/\\/, "\\\\"); gsub(/"/, "\\\""); printf "%s\\n", $0}')
        notify_gotify "Backup: paperless ✗" "Exit ${exit_code} at $(date -u +%Y-%m-%dT%H:%M:%SZ)\n\n${tail_log}" 8
      fi
    }
    trap cleanup EXIT

    echo "[backup] Starting at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

    # 1. Quiesce — stops document processing jobs
    echo "[backup] Scaling down ${DEPLOYMENT}..."
    kubectl scale deployment/${DEPLOYMENT} -n ${NAMESPACE} --replicas=0
    kubectl rollout status deployment/${DEPLOYMENT} -n ${NAMESPACE} --timeout=120s
    echo "[backup] ${DEPLOYMENT} is down"

    # 2. Dump the paperless database to ephemeral local storage
    echo "[backup] Dumping database..."
    mkdir -p /db
    pg_dump --format=custom --file="${DB_DUMP}"
    echo "[backup] Database dump complete: $(du -sh ${DB_DUMP} | cut -f1)"

    # 3. Init restic repo on Filen if this is the first run
    if ! restic cat config &>/dev/null; then
      echo "[backup] Initialising new restic repository on Filen..."
      restic init
    fi

    # 4. Single restic snapshot: DB dump + data dir + media (scanned documents).
    #    restic is content-addressable: only new or changed chunks are uploaded.
    echo "[backup] Running restic backup..."
    restic backup "${DB_DUMP}" /data /media \
      --tag "$(date +%Y-%m-%d)" \
      --tag paperless \
      --verbose

    # 5. Forget old snapshots (keep 30 daily) and prune orphaned pack files from Filen
    echo "[backup] Pruning old snapshots..."
    restic forget --keep-daily 30 --prune

    # 6. Spot-check: verify 1/10th of the repository data
    echo "[backup] Checking repository integrity..."
    restic check --read-data-subset=1/10

    echo "[backup] Done at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    # trap fires here → scale back up
