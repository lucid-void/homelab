---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: paperless
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: "2.20.15"
            env:
              TZ: Europe/Brussels
              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_DBHOST: postgres-rw.postgres.svc.cluster.local
              PAPERLESS_DBPORT: "5432"
              PAPERLESS_DBNAME: paperless
              PAPERLESS_DBUSER: paperless
              PAPERLESS_DBPASS:
                valueFrom:
                  secretKeyRef:
                    name: paperless-role-secret
                    key: password
              PAPERLESS_REDIS: redis://paperless-valkey:6379
              PAPERLESS_URL: https://paperless.blackcats.cc
              PAPERLESS_TIME_ZONE: Europe/Brussels
              PAPERLESS_OCR_LANGUAGE: eng+fra+nld
              PAPERLESS_OCR_LANGUAGES: "nld fra"
              PAPERLESS_TIKA_ENABLED: "0"
              PAPERLESS_DATA_DIR: /data
              PAPERLESS_MEDIA_ROOT: /media
              PAPERLESS_CONSUMPTION_DIR: /consume
              USERMAP_UID: "1000"
              USERMAP_GID: "1000"
              PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
              PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL: "https"
              PAPERLESS_ACCOUNT_EMAIL_VERIFICATION: "none"
            envFrom:
              - secretRef:
                  name: paperless-app-secret
              - secretRef:
                  name: paperless-oidc-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                memory: 512Mi
                cpu: 100m
              limits:
                memory: 2Gi

      valkey:
        containers:
          app:
            image:
              repository: valkey/valkey
              tag: 9-alpine
            resources:
              requests:
                memory: 64Mi
                cpu: 10m
              limits:
                memory: 256Mi

      # ProtonMail Bridge — exposes the Proton account as local IMAP/SMTP so
      # Paperless can consume documents from email. Migrated from the old Docker
      # host (shenxn/protonmail-bridge). Keychain lives on the bridge-config PVC;
      # the Proton login is one-time runtime state, done via `kubectl exec`, not GitOps.
      protonmail-bridge:
        replicas: 1
        containers:
          app:
            image:
              repository: shenxn/protonmail-bridge
              tag: "3.19.0-1"
            # apt-get hack installs libfido2 so the bridge CLI starts cleanly, then
            # runs the image's entrypoint which launches the bridge non-interactively.
            command:
              - /bin/bash
              - -c
              - apt-get update && apt-get install -y libfido2-dev libcbor-dev libfido2-1 && bash /protonmail/entrypoint.sh
            resources:
              requests:
                memory: 128Mi
                cpu: 25m
              limits:
                memory: 512Mi

    service:
      app:
        controller: app
        ports:
          http:
            port: 8000
      valkey:
        controller: valkey
        ports:
          redis:
            port: 6379
      protonmail-bridge:
        controller: protonmail-bridge
        ports:
          smtp:
            port: 25
          imap:
            port: 143

    persistence:
      data:
        existingClaim: paperless-data
        advancedMounts:
          app:
            app:
              - path: /data
      media:
        existingClaim: paperless-media
        advancedMounts:
          app:
            app:
              - path: /media
      consume:
        existingClaim: paperless-consume
        advancedMounts:
          app:
            app:
              - path: /consume
      bridge-config:
        existingClaim: protonmail-bridge-config
        advancedMounts:
          protonmail-bridge:
            app:
              - path: /root
