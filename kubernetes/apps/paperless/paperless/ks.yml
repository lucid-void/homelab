---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
  namespace: flux-system
spec:
  targetNamespace: paperless
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: paperless-database
    - name: shared-gateway
    - name: sealed-secrets
  path: ./kubernetes/apps/paperless/paperless/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false
  interval: 30m
  timeout: 10m
