.global:
  shareHost: &globalShareHost synology.blackcats.cc
  shareBasePath: &globalShareBasePath "/volume2/Kubernetes"
  controllerBasePath: &globalControllerBasePath "/mnt/kubernetes.nfs"


# driver only works with 1.16+
csiDriver:
  # should be globally unique for a given cluster
  name: "synology.democratic-csi.nfs-client"
  fsGroupPolicy: File

storageClasses:
  - name: nfs-client
    defaultClass: true
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: false
    parameters:
      fsType: nfs

    mountOptions:
      - noatime
      - nfsvers=4
    # secrets:
    #   provisioner-secret:
    #   controller-publish-secret:
    #   node-stage-secret:
    #   node-publish-secret:
    #   controller-expand-secret:

# if your cluster supports snapshots you may enable below
volumeSnapshotClasses: []
#- name: nfs-client
#  secrets:
#    snapshotter-secret:

driver:
  config:
    # please see the most up-to-date example of the corresponding config here:
    # https://github.com/democratic-csi/democratic-csi/tree/master/examples
    # YOU MUST COPY THE DATA HERE INLINE!
    driver: nfs-client
    instance_id: 33823a5b-0d7a-40e8-b931-92a03b1e0889
    _private:
      csi:
        volume:
          idTemplate: "{{lookup parameters 'csi.storage.k8s.io/pvc/namespace'}}-{{lookup parameters 'csi.storage.k8s.io/pvc/name'}}"
    nfs:
      shareHost: *globalShareHost
      shareBasePath: *globalShareBasePath
      # shareHost:shareBasePath should be mounted at this location in the controller container
      controllerBasePath: *globalControllerBasePath
      dirPermissionsMode: "0777"
      dirPermissionsUser: 0
      dirPermissionsGroup: 0
      # snapshots:
      #   # can create multiple snapshot classes each with a parameters.driver value which
      #   # overrides the default, a single install can use all 3 simultaneously if desired
      #   #
      #   # available options:
      #   # - filecopy = rsync/cp
      #   # - restic
      #   # - kopia
      #   #
      #   default_driver: filecopy

      #   # snapshot hostname will be set to the csiDriver.name value, in the case
      #   # it is assumed that the repo has been created beforehand
      #   restic:
      #     global_flags: []
      #     #  - --insecure-tls

      #     # these are added to snapshots, but are NOT used for querying/selectors by democratic-csi
      #     # it is *HIGHLY* recommended to set the instance_id parameter when using restic, it should be a universally unique ID for every deployment
      #     # host will be set to csi driver name
      #     tags: []
      #     #  - foobar
      #     #  - baz=bar

      #     # automatically prune when a snapshot is deleted
      #     prune: true

      #     # at a minimum RESTIC_PASSWORD and RESTIC_REPOSITORY must be set, additionally
      #     # any relevant env vars for connecting to RESTIC_REPOSITORY should be set
      #     env: {}
      #     # RESTIC_PASSWORD
      #     # RESTIC_REPOSITORY
      #     # AWS_ACCESS_KEY_ID=<MY_ACCESS_KEY>
      #     # AWS_SECRET_ACCESS_KEY=<MY_SECRET_ACCESS_KEY>
      #     # B2_ACCOUNT_ID=<MY_APPLICATION_KEY_ID>
      #     # B2_ACCOUNT_KEY=<MY_APPLICATION_KEY>

      #   # snapshot hostname will be set to the csiDriver.name value, in the case
      #   # it is assumed that the repo has been created beforehand
      #   kopia:
      #     # kopia repository status -t -s
      #     config_token:
      #     global_flags: []
      #     # <key>:<value>
      #     tags: []
      #     #  - "foobar:true"
      #     env: {}

# There are 4 different approaches to installing the driver
# 1: Run the controller service separated from the node service, mount the base share into the controller pod at run time
# 2. Run the controller service separated from the node service, use an existing hostPath mount of the base share from the node in the controller pod
# 3. Run the controller service jointly with the node service, mount the base share into the node pod at run time
# 4. Run the controller service jointly with the node service, use an existing hostPath mount of the base share from the node in the node pod
#
# Uncomment the lines/sections below appropriate for your desired use-case

controller:
  enabled: true

  externalResizer:
    enabled: false

  # For Options 1 and 2
  strategy: deployment

  # For Option 1
  hostNetwork: true
  hostIPC: true

  driver:
    securityContext:
      allowPrivilegeEscalation: true
      capabilities:
        add:
        - SYS_ADMIN
      privileged: true
    lifecycle:
      postStart:
        exec:
          command: ["/bin/sh", "-c", "mkdir -p /mnt/kubernetes.nfs; mount synology.blackcats.cc:/volume2/Kubernetes /mnt/kubernetes.nfs"]
      preStop:
        exec:
          command: ["/bin/sh","-c","umount /mnt/kubernetes.nfs"]

