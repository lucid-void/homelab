---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: romm
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      # ROM manager: scans a library, fetches box art/metadata (IGDB/ScreenScraper/
      # Hasheous), serves a web UI, and exposes the library to Tinfoil/DBI on a
      # modded Switch. Single controller "app" → Deployment/Service named "romm".
      # The image runs as root and ignores PUID/PGID (rommapp/romm#1302), so no
      # securityContext override — it primarily *reads* the media share.
      app:
        replicas: 1
        annotations:
          # Restart when the Terraform-written OIDC secret is (re)created so RomM
          # picks up the Zitadel credentials. Absent secret => OIDC simply off.
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rommapp/romm
              tag: "5.0.0"
            env:
              TZ: Europe/Brussels
              # --- Database (external CNPG Postgres) ---
              ROMM_DB_DRIVER: postgresql
              DB_HOST: postgres-rw.postgres.svc.cluster.local
              DB_PORT: "5432"
              DB_NAME: romm
              DB_USER: romm
              DB_PASSWD:
                valueFrom:
                  secretKeyRef:
                    name: romm-role-secret
                    key: password
              # Session/JWT signing key — must stay stable (openssl rand -hex 32).
              ROMM_AUTH_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: romm-secret
                    key: ROMM_AUTH_SECRET_KEY
              # Keyless metadata source. Hash-based only, so it can never match
              # switch/switch-2 — both are in RomM's NON_HASHABLE_PLATFORMS
              # (backend/handler/filesystem/roms_handler.py), meaning no md5/sha1/
              # crc is ever computed for them on any scan type. Kept on for the
              # hashable platforms.
              HASHEOUS_API_ENABLED: "true"
              # Pulls blawar/titledb into the Valkey cache so a Switch title ID in
              # a filename resolves to the canonical game name before it is handed
              # to a metadata provider. Off by default upstream; without it
              # _switch_productid_format() logs "Could not find the Switch
              # productID index file in cache" and falls back to the raw filename.
              # Cron default 04:00; task is manual_run so it can be kicked from the
              # UI (Administration → Tasks) instead of waiting.
              ENABLE_SCHEDULED_UPDATE_SWITCH_TITLEDB: "true"
              # v5 gate on OIDC auto-registration. Upstream defaults to "true";
              # pinned here so a future default flip can't silently close (or
              # open) self-registration. True is required for first login —
              # Zitadel is the only user store, so a RomM account only exists
              # once its Zitadel user has signed in once. Not written by
              # zitadel-bootstrap Terraform, so this does not fight romm-oidc-secret.
              OIDC_ALLOW_REGISTRATION: "true"
            envFrom:
              # OIDC_ENABLED/PROVIDER/CLIENT_ID/CLIENT_SECRET/REDIRECT_URI/
              # SERVER_APPLICATION_URL — all written by zitadel-bootstrap Terraform.
              # optional: on a fresh cluster RomM boots with OIDC disabled (local
              # admin via the first-run setup wizard) until the secret appears.
              - secretRef:
                  name: romm-oidc-secret
                  optional: true
              # IGDB_CLIENT_ID/IGDB_CLIENT_SECRET from a Twitch developer app
              # (igdb-sealed.yml). Name-based matching — the only source that can
              # identify switch/switch-2 titles, since those platforms are never
              # hashed and Hasheous is hash-only. NOTE: app-template v3.7.3 strips
              # `optional` from envFrom.secretRef on regular containers as well as
              # initContainers, so this reference is effectively mandatory — the
              # SealedSecret must exist or the pod sits in
              # CreateContainerConfigError. Keep both in the same commit.
              - secretRef:
                  name: romm-igdb-secret
                  optional: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  initialDelaySeconds: 45
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 15
              readiness: *probes
            resources:
              requests:
                memory: 512Mi
                cpu: 50m
              limits:
                memory: 2Gi

    service:
      app:
        controller: app
        ports:
          http:
            port: 8080

    persistence:
      # config.yml, IGDB/ScreenScraper artwork cache, uploaded saves & states.
      config:
        existingClaim: romm-config
        globalMounts:
          - path: /romm/config
            subPath: config
          - path: /romm/resources
            subPath: resources
          - path: /romm/assets
            subPath: assets
      # Embedded Valkey job queue/cache — ephemeral, regenerated on restart.
      # Kept off NFS to avoid AOF/fsync locking issues over the share.
      redis:
        type: emptyDir
        globalMounts:
          - path: /redis-data
      # ROM library on the Synology Media share (Games/). RomM expects the roms
      # under <library>/roms/<platform>/ — e.g. Games/roms/switch/*.nsp.
      library:
        existingClaim: media-nfs
        globalMounts:
          - path: /romm/library
            subPath: Games
