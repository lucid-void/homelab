---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freshrss
  namespace: freshrss
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      app:
        initContainers:
          extensions:
            image:
              repository: alpine
              tag: "3.23"
            command:
              - /bin/sh
              - -c
              - |
                set -e
                apk add --no-cache unzip wget >/dev/null 2>&1
                cd /var/www/FreshRSS/extensions

                wget -q -O youlag.zip \
                  https://github.com/civilblur/youlag/releases/download/v4.4.2/youlag-4.4.2.zip
                unzip -qo youlag.zip
                rm youlag.zip

                wget -q -O aisummary.zip \
                  https://github.com/deimosfr/xExtension-AiSummary/archive/refs/tags/v1.1.0.zip
                unzip -qo aisummary.zip
                mv xExtension-AiSummary-1.1.0 xExtension-AiSummary
                rm aisummary.zip

        containers:
          app:
            image:
              repository: freshrss/freshrss
              tag: "1.29.1"
            env:
              TZ: Europe/Brussels
              FRESHRSS_ENV: production
              CRON_MIN: "*/20"
              DB_TYPE: pgsql
              DB_HOST: postgres-rw.postgres.svc.cluster.local
              DB_PORT: "5432"
              DB_BASE: freshrss
              DB_USER: freshrss
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: freshrss-role-secret
                    key: password
              OIDC_ENABLED: "1"
              OIDC_PROVIDER_METADATA_URL: "https://zitadel.blackcats.cc/.well-known/openid-configuration"
              OIDC_SCOPES: "openid email profile"
              OIDC_USERNAME_CLAIM: "preferred_username"
              OIDC_REMOTE_USER_CLAIM: "preferred_username"
              OIDC_X_FORWARDED_HEADERS: "X-Forwarded-Host X-Forwarded-Port X-Forwarded-Proto"
              OIDC_CLIENT_CRYPTO_KEY: "freshrss-oidc-session-key-blackcats"
            envFrom:
              - secretRef:
                  name: freshrss-oidc-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                memory: 128Mi
                cpu: 25m
              limits:
                memory: 512Mi

    service:
      app:
        controller: app
        ports:
          http:
            port: 80

    persistence:
      data:
        existingClaim: freshrss-data
        globalMounts:
          - path: /var/www/FreshRSS/data
      extensions:
        type: emptyDir
        globalMounts:
          - path: /var/www/FreshRSS/extensions
