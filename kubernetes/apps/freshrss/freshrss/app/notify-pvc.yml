---
# Tiny PVC holding the notifier's dedup state (seen GReader item IDs).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: freshrss-notify-state
  namespace: freshrss
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 100Mi
