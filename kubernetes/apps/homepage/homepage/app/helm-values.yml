---
config:
  kubernetes:
    mode: cluster

  settings:
    title: Homelab
    theme: dark
    color: slate
    headerStyle: clean
    useEqualHeights: true
    layout:
      Media:
        columns: 3
        style: row
      Documents:
        columns: 3
        style: row
      Infrastructure:
        columns: 3
        style: row

  widgets:
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: medium
          hourCycle: h23

  services:
    - Media:
        - Plex:
            href: https://plex.blackcats.cc
            description: Media server
            icon: plex.png
        - Seerr:
            href: https://seerr.blackcats.cc
            description: Request media
            icon: overseerr.png
        - Sonarr:
            href: https://sonarr.blackcats.cc
            description: TV series
            icon: sonarr.png
        - Radarr:
            href: https://radarr.blackcats.cc
            description: Movies
            icon: radarr.png
        - Prowlarr:
            href: https://prowlarr.blackcats.cc
            description: Indexers
            icon: prowlarr.png
        - Sabnzbd:
            href: https://nzb.blackcats.cc
            description: Downloader
            icon: sabnzbd.png
    - Documents:
        - Paperless:
            href: https://paperless.blackcats.cc
            description: Document management
            icon: paperless-ngx.png
        - FreshRSS:
            href: https://rss.blackcats.cc
            description: RSS reader
            icon: freshrss.png
        - Homebox:
            href: https://homebox.blackcats.cc
            description: Home inventory
            icon: homebox.png
    - Development:
        - Gitea:
            href: https://gitea.blackcats.cc
            description: Git service
            icon: gitea.png
    - Infrastructure:
        - Proxmox:
            href: https://pve.blackcats.cc:8006
            description: Hypervisor
            icon: proxmox.png
        - Zitadel:
            href: https://zitadel.blackcats.cc
            description: Identity & access
            icon: sh-zitadel
        - Gotify:
            href: https://gotify.blackcats.cc
            description: Notifications
            icon: gotify.png
        - Gatus:
            href: https://gatus.blackcats.cc
            description: Status monitoring
            icon: gatus.png
        - Goldilocks:
            href: https://goldilocks.blackcats.cc
            description: VPA recommendations
            icon: sh-goldilocks

resources:
  requests:
    memory: 64Mi
    cpu: 25m
  limits:
    memory: 256Mi

ingress:
  main:
    enabled: false

enableRbac: true
serviceAccount:
  create: true

env:
  HOMEPAGE_ALLOWED_HOSTS: home.blackcats.cc
