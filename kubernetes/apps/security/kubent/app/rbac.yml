---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubent
  namespace: security
---
# Read access to all resources so kubent can find deprecated API usage across the cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubent
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubent
subjects:
  - kind: ServiceAccount
    name: kubent
    namespace: security
