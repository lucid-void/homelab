---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubent-script
  namespace: security
data:
  # The kubent initContainer wrote its findings to /work/kubent.out (text, or
  # absent/empty when the cluster is clean). This container only reads that file
  # and reports the result to Gotify. It also echoes the findings to stdout so
  # `kubectl logs -c notify` still shows them for manual pre-upgrade prechecks.
  notify.sh: |
    #!/bin/sh
    GOTIFY_URL="https://gotify.blackcats.cc"
    OUT="/work/kubent.out"

    echo "===== kubent output ====="
    [ -f "$OUT" ] && cat "$OUT"
    echo "========================="

    content=""
    [ -f "$OUT" ] && content=$(tr -d '[:space:]' < "$OUT")

    if [ -z "$content" ]; then
      echo "kubent: clean"
      curl -s -X POST "${GOTIFY_URL}/message" \
        -H "X-Gotify-Key: ${GOTIFY_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{"title":"kubent: clean","message":"No deprecated API versions found.","priority":3}'
    else
      echo "kubent: deprecated APIs found"
      body=$(tail -40 "$OUT" | awk '{gsub(/[\\"]/, "\\\\&"); printf "%s\\n", $0}')
      curl -s -X POST "${GOTIFY_URL}/message" \
        -H "X-Gotify-Key: ${GOTIFY_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{\"title\":\"kubent: deprecated APIs found\",\"message\":\"${body}\",\"priority\":8}"
    fi
