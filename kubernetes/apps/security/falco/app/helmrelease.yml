---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: "9.1.0"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    driver:
      kind: modern_ebpf

    collectors:
      enabled: true

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    falcosidekick:
      enabled: true
      config:
        gotify:
          hostport: "http://gotify.monitoring.svc.cluster.local"
          minimumpriority: "warning"
      extraEnv:
        - name: GOTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: falco-gotify-secret
              key: GOTIFY_TOKEN
              optional: true
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
