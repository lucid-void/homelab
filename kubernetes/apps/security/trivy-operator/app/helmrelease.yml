---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: trivy-operator
      version: "0.32.1"
      sourceRef:
        kind: HelmRepository
        name: aquasecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      registry: mirror.gcr.io
      repository: aquasec/trivy-operator
      # Pinned digest — supply chain hardening; bump alongside chart upgrades
      tag: "0.30.1@sha256:448484ece65e26f1c7237c8d20dab997f5a8319968286a09e188140b863cf1f9"

    operator:
      vulnerabilityScannerEnabled: true
      configAuditScannerEnabled: true
      scanJobTimeout: 5m
      # Scan user workloads only; exclude kube-system and flux-system noise
      targetNamespaces: "auth,cert-manager,cnpg-system,democratic-csi,freshrss,gitea,homebox,homepage,immich,media,monitoring,network,paperless,postgres,security"

    trivy:
      # Standalone mode: pull the vuln DB once at operator startup, reuse for all scans.
      # dbRepository is left at the chart default (aquasec/trivy-db from mirror.gcr.io).
      # Setting a full ghcr.io/... path here causes double-prefixing: mirror.gcr.io/ghcr.io/...
      mode: standalone

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
