---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-reporter
  namespace: security
---
# Read Trivy Operator CRDs across all namespaces to build the weekly report
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-reporter
rules:
  - apiGroups: ["aquasecurity.github.io"]
    resources:
      - vulnerabilityreports
      - configauditreports
      - exposedsecretreports
      - clustervulnerabilityreports
      - clusterconfigauditreports
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-reporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: security-reporter
subjects:
  - kind: ServiceAccount
    name: security-reporter
    namespace: security
