---
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-report-script
  namespace: security
data:
  # Reads a Trivy CRD list (JSON on stdin), outputs TSV rows for Critical/High items.
  # Usage: kubectl get <crd> --all-namespaces -o json | python3 /scripts/extract.py (owner|self)
  # backup-tools image has no jq; Python is used throughout.
  extract.py: |
    import json, sys

    use_owner = sys.argv[1] == "owner"
    data = json.load(sys.stdin)
    for item in data.get("items", []):
        s = item.get("report", {}).get("summary", {})
        crit = s.get("criticalCount", 0)
        high = s.get("highCount", 0)
        if crit > 0 or high > 0:
            ns = item["metadata"]["namespace"]
            refs = item["metadata"].get("ownerReferences", [])
            name = refs[0]["name"] if (use_owner and refs) else item["metadata"]["name"]
            print(f"{ns}\t{name}\t{crit}\t{high}")

  # Builds the Gotify JSON payload.
  # Usage: python3 /scripts/build_payload.py <body_file> <total> <priority>
  build_payload.py: |
    import json, sys

    body_file, total, priority = sys.argv[1], sys.argv[2], int(sys.argv[3])
    with open(body_file) as f:
        message = f.read()
    print(json.dumps({
        "title": f"Security: {total} workloads with Critical/High findings",
        "message": message,
        "priority": priority,
    }))

  report.sh: |
    #!/bin/bash
    set -euo pipefail

    GOTIFY_URL="https://gotify.blackcats.cc"

    # ── Collect findings ──────────────────────────────────────────────────────
    vuln_findings=$(kubectl get vulnerabilityreports --all-namespaces -o json 2>/dev/null \
      | python3 /scripts/extract.py owner 2>/dev/null || true)

    audit_findings=$(kubectl get configauditreports --all-namespaces -o json 2>/dev/null \
      | python3 /scripts/extract.py self 2>/dev/null || true)

    secret_findings=$(kubectl get exposedsecretreports --all-namespaces -o json 2>/dev/null \
      | python3 /scripts/extract.py owner 2>/dev/null || true)

    # ── Count totals ─────────────────────────────────────────────────────────
    # grep -c exits 1 on no matches; use || true so $() captures only grep's
    # own "0" output and doesn't double-print via a second echo.
    vuln_count=$(echo "$vuln_findings" | grep -c . || true)
    audit_count=$(echo "$audit_findings" | grep -c . || true)
    secret_count=$(echo "$secret_findings" | grep -c . || true)
    total=$(( vuln_count + audit_count + secret_count ))

    echo "Vuln findings:   $vuln_count"
    echo "Audit findings:  $audit_count"
    echo "Secret findings: $secret_count"
    echo "Total:           $total"

    # ── Silent on pass ───────────────────────────────────────────────────────
    if [ "$total" -eq 0 ]; then
      echo "No Critical/High findings — skipping Gotify notification."
      exit 0
    fi

    # ── Determine priority ────────────────────────────────────────────────────
    has_critical=false
    for findings in "$vuln_findings" "$audit_findings" "$secret_findings"; do
      while IFS=$'\t' read -r ns name crit high; do
        [ "$crit" -gt 0 ] 2>/dev/null && has_critical=true && break 2
      done <<< "$findings"
    done
    priority=5
    $has_critical && priority=7

    # ── Build message body (capped at 20 rows) ────────────────────────────────
    body=""
    row=0

    if [ -n "$vuln_findings" ]; then
      body+="**Vulnerabilities** (${vuln_count} workloads)\n"
      body+="Namespace | Workload | Crit | High\n"
      body+="--- | --- | --- | ---\n"
      while IFS=$'\t' read -r ns name crit high && [ $row -lt 20 ]; do
        body+="${ns} | ${name} | ${crit} | ${high}\n"
        row=$(( row + 1 ))
      done <<< "$vuln_findings"
      body+="\n"
    fi

    if [ -n "$audit_findings" ]; then
      body+="**Config Audit** (${audit_count} resources)\n"
      body+="Namespace | Resource | Crit | High\n"
      body+="--- | --- | --- | ---\n"
      while IFS=$'\t' read -r ns name crit high && [ $row -lt 20 ]; do
        body+="${ns} | ${name} | ${crit} | ${high}\n"
        row=$(( row + 1 ))
      done <<< "$audit_findings"
      body+="\n"
    fi

    if [ -n "$secret_findings" ]; then
      body+="**Exposed Secrets** (${secret_count} workloads)\n"
      body+="Namespace | Workload | Crit | High\n"
      body+="--- | --- | --- | ---\n"
      while IFS=$'\t' read -r ns name crit high && [ $row -lt 20 ]; do
        body+="${ns} | ${name} | ${crit} | ${high}\n"
        row=$(( row + 1 ))
      done <<< "$secret_findings"
    fi

    # ── Post to Gotify ────────────────────────────────────────────────────────
    printf '%b' "$body" > /tmp/report_body.txt
    payload=$(python3 /scripts/build_payload.py /tmp/report_body.txt "$total" "$priority")

    curl -sf \
      -X POST "${GOTIFY_URL}/message" \
      -H "X-Gotify-Key: ${GOTIFY_TOKEN}" \
      -H "Content-Type: application/json" \
      -d "$payload"

    echo "Notification sent (priority ${priority})."
