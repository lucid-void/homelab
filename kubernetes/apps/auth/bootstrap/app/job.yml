---
apiVersion: batch/v1
kind: Job
metadata:
  name: zitadel-bootstrap
  namespace: auth
spec:
  # Idempotent: Terraform apply is a no-op when state matches desired config.
  # TTL lets Flux recreate on next reconcile (e.g. after a cluster rebuild).
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: zitadel-bootstrap
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      volumes:
        - name: tf-config
          configMap:
            name: zitadel-bootstrap-tf
            defaultMode: 0550
        - name: workspace
          emptyDir: {}
      containers:
        - name: tofu
          image: ghcr.io/opentofu/opentofu:1.9.1
          command:
            - /bin/sh
            - /tf-config/run.sh
          env:
            - name: TF_VAR_zitadel_pat
              valueFrom:
                secretKeyRef:
                  name: zitadel-bootstrap-token
                  key: token
            - name: HOME
              value: /workspace
          volumeMounts:
            - name: tf-config
              mountPath: /tf-config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
