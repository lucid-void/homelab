---
apiVersion: batch/v1
kind: Job
metadata:
  name: zitadel-bootstrap
  namespace: auth
spec:
  # Idempotent: Terraform apply is a no-op when state matches desired config.
  # TTL lets Flux recreate on next reconcile (e.g. after a cluster rebuild).
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: zitadel-bootstrap
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      # gRPC-go 1.67+ enforces ALPN h2; the Cilium Gateway does not advertise it
      # in the TLS handshake, so port 443 fails. Connect directly to the Zitadel
      # Service on port 8080 (h2c). Zitadel identifies its instance by the Host
      # header so the domain must stay zitadel.blackcats.cc, not the svc DNS name.
      # The ClusterIP is stable for the lifetime of the Service; if it ever changes
      # (Service deleted+recreated), update with:
      #   kubectl get svc zitadel -n auth -o jsonpath='{.spec.clusterIP}'
      hostAliases:
        - ip: "10.102.171.8"
          hostnames:
            - "zitadel.blackcats.cc"
      volumes:
        - name: tf-config
          configMap:
            name: zitadel-bootstrap-tf
            defaultMode: 0550
        - name: workspace
          emptyDir: {}
      containers:
        - name: tofu
          image: ghcr.io/opentofu/opentofu:1.9.1
          command:
            - /bin/sh
            - /tf-config/run.sh
          env:
            - name: TF_VAR_zitadel_pat
              valueFrom:
                secretKeyRef:
                  name: zitadel-bootstrap-token
                  key: token
            - name: HOME
              value: /workspace
          volumeMounts:
            - name: tf-config
              mountPath: /tf-config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
