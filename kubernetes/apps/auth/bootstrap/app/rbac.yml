---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel-bootstrap
  namespace: auth
---
# Allows Terraform kubernetes backend to store state in auth namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-state
  namespace: auth
rules:
  # list needed for Terraform backend workspace discovery (resourceNames restriction doesn't apply to list)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
    resourceNames: ["tfstate-default-zitadel-bootstrap"]
  # leases needed for Terraform state locking (create cannot be restricted by resourceName)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "update", "patch", "delete"]
    resourceNames: ["lock-tfstate-default-zitadel-bootstrap"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-state
  namespace: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-state
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
---
# Allows Terraform to write the OIDC config Secret into the immich namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-immich
  namespace: immich
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
    resourceNames: ["immich-oidc-config"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-immich
  namespace: immich
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-immich
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
---
# Allows Terraform to write the OIDC secret into the freshrss namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-freshrss
  namespace: freshrss
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
    resourceNames: ["freshrss-oidc-secret"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-freshrss
  namespace: freshrss
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-freshrss
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
---
# Allows Terraform to write the OIDC secret into the paperless namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-paperless
  namespace: paperless
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
    resourceNames: ["paperless-oidc-secret"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-paperless
  namespace: paperless
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-paperless
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
