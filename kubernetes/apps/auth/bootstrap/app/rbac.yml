---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel-bootstrap
  namespace: auth
---
# Allows Terraform kubernetes backend to store state in auth namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-state
  namespace: auth
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
    resourceNames: ["tfstate-default-zitadel-bootstrap"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-state
  namespace: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-state
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
---
# Allows Terraform to write the OIDC config Secret into the immich namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-immich
  namespace: immich
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
    resourceNames: ["immich-oidc-config"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-immich
  namespace: immich
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-immich
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
