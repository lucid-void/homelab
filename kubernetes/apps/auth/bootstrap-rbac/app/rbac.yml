# Allows zitadel-bootstrap Terraform job to write the Proxmox OIDC secret into the auth namespace.
# Proxmox is outside the cluster, so this secret is only a retrieval mechanism for the realm config.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-bootstrap-auth
  namespace: auth
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
    resourceNames: ["proxmox-oidc-secret"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-bootstrap-auth
  namespace: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zitadel-bootstrap-auth
subjects:
  - kind: ServiceAccount
    name: zitadel-bootstrap
    namespace: auth
