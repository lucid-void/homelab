---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailrise
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailrise
  template:
    metadata:
      labels:
        app: mailrise
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mailrise
          image: yoryan/mailrise:1.4.0
          ports:
            - containerPort: 8025
              name: smtp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/mailrise.conf
              subPath: mailrise.cfg
              readOnly: true
            - name: apprise-patch
              mountPath: /home/mailrise/.local/lib/python3.11/site-packages/apprise/conversion.py
              subPath: conversion.py
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          secret:
            secretName: mailrise-config
        - name: apprise-patch
          configMap:
            name: apprise-conversion-patch
---
apiVersion: v1
kind: Service
metadata:
  name: mailrise
  namespace: auth
spec:
  selector:
    app: mailrise
  ports:
    - name: smtp
      port: 8025
      targetPort: smtp
