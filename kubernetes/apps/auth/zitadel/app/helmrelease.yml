---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: auth
spec:
  interval: 30m
  chart:
    spec:
      chart: zitadel
      version: "10.*"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: zitadel-helm-values
      valuesKey: values.yaml
  values:
    replicaCount: 1

    # bitnami/kubectl has no version tags — only latest and digests.
    # Override the auto-derived Capabilities.KubeVersion tag to latest.
    setupJob:
      machinekeyWriter:
        image:
          tag: latest

    zitadel:
      masterkeySecretName: zitadel-masterkey

      configmapConfig:
        ExternalDomain: zitadel.blackcats.cc
        ExternalPort: 443
        ExternalSecure: true

        # TLS terminated at the gateway; Zitadel itself speaks plain HTTP
        TLS:
          Enabled: false

        Database:
          Postgres:
            Host: postgres-rw.postgres.svc.cluster.local
            Port: 5432
            Database: zitadel
            MaxOpenConns: 20
            MaxIdleConns: 10
            MaxConnLifetime: 30m
            MaxConnIdleTime: 5m
            User:
              Username: zitadel
              SSL:
                Mode: disable
            Admin:
              Username: zitadel
              SSL:
                Mode: disable

        Notifications:
          Email:
            SMTP:
              TLS: false
              Host: mailrise.auth.svc.cluster.local:8025
              From: zitadel@blackcats.cc
              FromName: Zitadel

        FirstInstance:
          Org:
            Name: Homelab
            # Creates a machine user + PAT for the Terraform bootstrap job.
            # After first setup, PAT is visible in the zitadel-setup Job logs:
            #   kubectl logs job/zitadel-setup -n auth | grep -i "token\|pat"
            Machine:
              Machine:
                Username: terraform
                Name: Terraform Bootstrap
              Pat:
                ExpirationDate: "2099-01-01T00:00:00Z"
          DefaultAdmin:
            # Username and password come from config-secret.yml → zitadel-config-secret
            Username: root@blackcats.cc

    service:
      type: ClusterIP
      port: 8080
      appProtocol: kubernetes.io/h2c

    ingress:
      enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
