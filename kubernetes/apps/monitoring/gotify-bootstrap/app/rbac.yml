---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gotify-bootstrap
  namespace: monitoring
---
# ClusterRole needed to create/patch secrets across namespaces (postgres, immich, monitoring)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gotify-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gotify-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gotify-bootstrap
subjects:
  - kind: ServiceAccount
    name: gotify-bootstrap
    namespace: monitoring
