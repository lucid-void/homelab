---
apiVersion: batch/v1
kind: Job
metadata:
  name: gotify-bootstrap
  namespace: monitoring
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: gotify-bootstrap
      securityContext:
        runAsNonRoot: false
      containers:
        - name: bootstrap
          image: alpine:3.21
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              set -o pipefail

              apk add --no-cache curl jq kubectl >/dev/null 2>&1

              GOTIFY_URL="http://gotify.monitoring.svc.cluster.local"

              echo "Waiting for Gotify..."
              until curl -sf "${GOTIFY_URL}/health" >/dev/null 2>&1; do sleep 5; done
              echo "Gotify is ready."

              # Fail fast on bad admin credentials. Otherwise every authenticated
              # call 401s and each token silently resolves to empty — the failure
              # mode that knocked out all notifications for days.
              if ! curl -sf -u "admin:${GOTIFY_ADMIN_PASS}" "${GOTIFY_URL}/current/user" >/dev/null; then
                echo "FATAL: admin auth to Gotify failed — gotify-admin-secret does not match the Gotify admin password" >&2
                exit 1
              fi
              echo "Admin auth OK."

              # Returns a non-empty token on stdout, or aborts the job. Diagnostics
              # go to stderr so they are never captured as the token value.
              create_or_get_app_token() {
                local name="$1" desc="$2" token
                token=$(curl -sf -u "admin:${GOTIFY_ADMIN_PASS}" \
                  "${GOTIFY_URL}/application" \
                  | jq -r ".[] | select(.name == \"${name}\") | .token // empty") || true
                if [ -z "$token" ]; then
                  token=$(curl -sf -X POST -u "admin:${GOTIFY_ADMIN_PASS}" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"${name}\",\"description\":\"${desc}\"}" \
                    "${GOTIFY_URL}/application" | jq -r '.token // empty') || true
                fi
                if [ -z "$token" ]; then
                  echo "FATAL: could not obtain app token for '${name}'" >&2
                  exit 1
                fi
                printf '%s' "$token"
              }

              create_or_get_client_token() {
                local name="$1" token
                token=$(curl -sf -u "admin:${GOTIFY_ADMIN_PASS}" \
                  "${GOTIFY_URL}/client" \
                  | jq -r ".[] | select(.name == \"${name}\") | .token // empty") || true
                if [ -z "$token" ]; then
                  token=$(curl -sf -X POST -u "admin:${GOTIFY_ADMIN_PASS}" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"${name}\"}" \
                    "${GOTIFY_URL}/client" | jq -r '.token // empty') || true
                fi
                if [ -z "$token" ]; then
                  echo "FATAL: could not obtain client token for '${name}'" >&2
                  exit 1
                fi
                printf '%s' "$token"
              }

              upsert_secret() {
                local ns="$1" name="$2" key="$3" value="$4"
                kubectl create secret generic "$name" \
                  --namespace="$ns" \
                  --from-literal="${key}=${value}" \
                  --dry-run=client -o yaml | kubectl apply -f -
              }

              etcd_snapshot_token=$(create_or_get_app_token "etcd-snapshot" "etcd snapshot backup notifications")
              postgres_token=$(create_or_get_app_token "postgres-backup" "Postgres backup job notifications")
              immich_token=$(create_or_get_app_token "immich-backup" "Immich backup job notifications")
              paperless_token=$(create_or_get_app_token "paperless-backup" "Paperless backup job notifications")
              gitea_token=$(create_or_get_app_token "gitea-backup" "Gitea backup job notifications")
              homebox_token=$(create_or_get_app_token "homebox-backup" "Homebox backup job notifications")
              security_token=$(create_or_get_app_token "security-scanner" "Trivy weekly security report")
              falco_token=$(create_or_get_app_token "falco" "Falco runtime security alerts")
              gatus_token=$(create_or_get_app_token "gatus" "Gatus health monitoring alerts")
              alertmanager_token=$(create_or_get_app_token "alertmanager" "AlertManager firing rule notifications")
              flux_token=$(create_or_get_app_token "flux" "Flux GitOps reconciliation failures")
              client_token=$(create_or_get_client_token "admin")

              upsert_secret "kube-system" "gotify-secret"        "GOTIFY_TOKEN" "$etcd_snapshot_token"
              upsert_secret "homebox"    "gotify-secret"       "GOTIFY_TOKEN" "$homebox_token"
              upsert_secret "postgres"   "gotify-secret"       "GOTIFY_TOKEN" "$postgres_token"
              upsert_secret "immich"     "gotify-secret"       "GOTIFY_TOKEN" "$immich_token"
              upsert_secret "paperless"  "gotify-secret"       "GOTIFY_TOKEN" "$paperless_token"
              upsert_secret "gitea"      "gotify-secret"       "GOTIFY_TOKEN" "$gitea_token"
              upsert_secret "security"   "gotify-secret"       "GOTIFY_TOKEN" "$security_token"
              upsert_secret "security"   "falco-gotify-secret" "GOTIFY_TOKEN" "$falco_token"
              upsert_secret "monitoring" "gatus-gotify-secret" "GOTIFY_TOKEN" "$gatus_token"
              upsert_secret "monitoring" "gotify-secret"       "GOTIFY_TOKEN" "$alertmanager_token"
              upsert_secret "monitoring" "gotify-client-secret" "CLIENT_TOKEN" "$client_token"
              # Flux notification-controller Provider (flux-notifications) auths to
              # Gotify with this header. Lives in `monitoring` (the Provider's own
              # namespace — secretRef resolves there). Key is `headers` (not
              # GOTIFY_TOKEN) because the generic webhook provider reads the token
              # from an HTTP header, formatted as YAML `Header: value`.
              upsert_secret "monitoring" "flux-gotify"        "headers" "X-Gotify-Key: $flux_token"

              # Reaching here means every token above validated non-empty.
              # Print names only — never the token values (these land in pod logs).
              echo "Bootstrap complete. Provisioned tokens:"
              echo "  etcd-snapshot    ✓"
              echo "  homebox-backup   ✓"
              echo "  postgres-backup  ✓"
              echo "  immich-backup    ✓"
              echo "  paperless-backup ✓"
              echo "  gitea-backup     ✓"
              echo "  security-scanner ✓"
              echo "  gatus            ✓"
              echo "  falco            ✓"
              echo "  alertmanager     ✓"
              echo "  flux             ✓"
              echo "  admin client     ✓"
          env:
            - name: GOTIFY_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: gotify-admin-secret
                  key: GOTIFY_DEFAULTUSER_PASS
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
