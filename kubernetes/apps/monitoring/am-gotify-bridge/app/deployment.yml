---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: am-gotify-bridge
  namespace: monitoring
  annotations:
    # Restart the bridge when the script ConfigMap changes (it's loaded once at
    # process start, so a volume remount alone wouldn't re-read it).
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: am-gotify-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: am-gotify-bridge
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: script
          configMap:
            name: am-gotify-bridge-script
            defaultMode: 0755
      containers:
        - name: bridge
          image: python:3.12-alpine
          command: ["python", "-u", "/scripts/bridge.py"]
          envFrom:
            - secretRef:
                name: gotify-secret
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              memory: 32Mi
              cpu: 5m
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: am-gotify-bridge
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: am-gotify-bridge
  ports:
    - name: http
      port: 5000
      targetPort: 5000
