---
apiVersion: v1
kind: ConfigMap
metadata:
  name: am-gotify-bridge-script
  namespace: monitoring
data:
  bridge.py: |
    #!/usr/bin/env python3
    import json, os, urllib.request
    import http.server

    GOTIFY_URL = os.environ.get("GOTIFY_URL", "http://gotify.monitoring.svc.cluster.local")
    GOTIFY_TOKEN = os.environ["GOTIFY_TOKEN"]

    def post_gotify(title, message, priority):
      url = f"{GOTIFY_URL}/message?token={GOTIFY_TOKEN}"
      body = json.dumps({"title": title, "message": message, "priority": priority}).encode()
      req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})
      try:
        urllib.request.urlopen(req, timeout=5)
      except Exception as e:
        print(f"[gotify] {e}")

    class Handler(http.server.BaseHTTPRequestHandler):
      def do_POST(self):
        length = int(self.headers.get("Content-Length", 0))
        try:
          data = json.loads(self.rfile.read(length))
          for alert in data.get("alerts", []):
            name = alert.get("labels", {}).get("alertname", "Alert")
            summary = alert.get("annotations", {}).get("summary", "")
            desc = alert.get("annotations", {}).get("description", "")
            message = "\n".join(filter(None, [summary, desc])) or name
            if alert.get("status") == "resolved":
              post_gotify(f"RESOLVED: {name}", message, 5)
            else:
              post_gotify(f"ALERT: {name}", message, 8)
          self.send_response(200)
        except Exception as e:
          print(f"[bridge] {e}")
          self.send_response(500)
        self.end_headers()

      def log_message(self, *a): pass

    print("[bridge] listening on :5000")
    http.server.HTTPServer(("", 5000), Handler).serve_forever()
