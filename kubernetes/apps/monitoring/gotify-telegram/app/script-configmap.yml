---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gotify-telegram-script
  namespace: monitoring
data:
  bridge.py: |
    #!/usr/bin/env python3
    import json, os, time, urllib.request, urllib.error
    import websocket

    host  = os.environ.get("GOTIFY_HOST", "http://gotify.monitoring.svc.cluster.local")
    token = os.environ["CLIENT_TOKEN"]
    tg_token  = os.environ["TELEGRAM_BOT_TOKEN"]
    tg_chat   = os.environ["TELEGRAM_CHAT_ID"]

    ws_url = host.replace("http", "ws") + "/stream?token=" + token

    def send(title, message, priority):
      emoji = "\U0001f534" if priority >= 8 else "\U0001f7e1" if priority >= 5 else "\U0001f7e2"
      text = f"{emoji} {title}\n{message}".strip()
      payload = json.dumps({"chat_id": tg_chat, "text": text}).encode()
      req = urllib.request.Request(
        f"https://api.telegram.org/bot{tg_token}/sendMessage",
        data=payload,
        headers={"Content-Type": "application/json"},
      )
      try:
        urllib.request.urlopen(req, timeout=10)
      except Exception as e:
        print(f"[telegram] {e}")

    def on_message(ws, raw):
      try:
        msg = json.loads(raw)
        print(f"[gotify] {msg.get('title')}: {msg.get('message')}")
        send(msg.get("title", ""), msg.get("message", ""), msg.get("priority", 5))
      except Exception as e:
        print(f"[bridge] {e}")

    def on_error(ws, err): print(f"[ws] {err}")
    def on_open(ws):       print(f"[ws] connected")
    def on_close(ws, *a):  print(f"[ws] closed")

    while True:
      try:
        websocket.WebSocketApp(ws_url,
          on_open=on_open, on_message=on_message,
          on_error=on_error, on_close=on_close,
        ).run_forever(ping_interval=30, ping_timeout=10)
      except Exception as e:
        print(f"[bridge] crash: {e}")
      print("[bridge] reconnecting in 5s...")
      time.sleep(5)
