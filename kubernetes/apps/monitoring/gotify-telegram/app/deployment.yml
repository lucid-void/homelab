---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify-telegram
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotify-telegram
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotify-telegram
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: script
          configMap:
            name: gotify-telegram-script
            defaultMode: 0755
      containers:
        - name: bridge
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - "pip install websocket-client -q && python /scripts/bridge.py"
          envFrom:
            - secretRef:
                name: gotify-client-secret
            - secretRef:
                name: telegram-secret
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 128Mi
