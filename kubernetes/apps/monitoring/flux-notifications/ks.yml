---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app flux-notifications
  namespace: flux-system
spec:
  targetNamespace: monitoring
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    # gotify-bootstrap writes the `flux-gotify` Secret (X-Gotify-Key header) the
    # Provider authenticates with. Without it the Provider stays NotReady.
    - name: gotify-bootstrap
  path: ./kubernetes/apps/monitoring/flux-notifications/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  timeout: 5m
