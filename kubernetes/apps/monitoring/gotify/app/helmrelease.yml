---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gotify
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      app:
        replicas: 1
        containers:
          app:
            image:
              repository: gotify/server
              tag: "2.6.0"
            env:
              TZ: Europe/Brussels
              GOTIFY_SERVER_PORT: "80"
              GOTIFY_DATABASE_DIALECT: sqlite3
              GOTIFY_DATABASE_CONNECTION: data/gotify.db
              GOTIFY_DEFAULTUSER_NAME: admin
            envFrom:
              - secretRef:
                  name: gotify-admin-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                memory: 64Mi
                cpu: 10m
              limits:
                memory: 256Mi

    service:
      app:
        controller: app
        ports:
          http:
            port: 80

    persistence:
      data:
        existingClaim: gotify-data
        globalMounts:
          - path: /app/data
