---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.76.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # ---------------------------------------------------------------------------
    # VictoriaMetrics Single — TSDB (replaces Prometheus)
    # ---------------------------------------------------------------------------
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "3"
        storage:
          storageClassName: openebs-hostpath
          resources:
            requests:
              storage: 30Gi
        resources:
          requests:
            memory: 512Mi
            cpu: 100m
          limits:
            memory: 1500Mi

    # VMCluster not needed — single-node is sufficient for homelab
    vmcluster:
      enabled: false

    # ---------------------------------------------------------------------------
    # VMAgent — metrics scraping
    # ---------------------------------------------------------------------------
    vmagent:
      enabled: true
      spec:
        scrapeInterval: 60s
        extraArgs:
          promscrape.kubernetesSDCheckInterval: 5m
          promscrape.maxDroppedTargets: "10"
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            cpu: 250m
            memory: 512Mi

    # ---------------------------------------------------------------------------
    # VMAlert — alert rule evaluation
    # ---------------------------------------------------------------------------
    vmalert:
      enabled: true
      spec:
        resources:
          requests:
            memory: 64Mi
            cpu: 10m
          limits:
            memory: 256Mi

    # ---------------------------------------------------------------------------
    # AlertManager — routes vmalert → am-gotify-bridge → Gotify
    # ---------------------------------------------------------------------------
    alertmanager:
      enabled: true
      spec:
        resources:
          requests:
            memory: 64Mi
            cpu: 10m
          limits:
            memory: 128Mi
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: gotify
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          group_by: ["alertname", "namespace"]
          routes:
            - matchers:
                - severity="none"
              receiver: blackhole
            - matchers:
                - severity="info"
              receiver: blackhole
            - matchers:
                - alertname="NodeNetworkTransmitErrs"
                - device=~"wt.+"
              receiver: blackhole
            - matchers:
                - alertname="KubeAPIErrorBudgetBurn"
              receiver: gotify
              repeat_interval: 24h
        receivers:
          - name: gotify
            # Re-enabled 2026-06-18: the control-plane flapping that caused the
            # original alert storm was resolved by the Proxmox XFS/LVM reinstall.
            # Alerts now flow again (needed so the Proxmox host/disk alerts
            # actually deliver). To silence, comment out webhook_configs.
            webhook_configs:
              - url: http://am-gotify-bridge.monitoring.svc.cluster.local:5000/webhook
                send_resolved: false
          - name: blackhole

    # ---------------------------------------------------------------------------
    # Grafana — dashboards (Zitadel OIDC, credentials from grafana-oidc-secret)
    # ---------------------------------------------------------------------------
    grafana:
      enabled: true
      envFromSecret: grafana-oidc-secret
      persistence:
        enabled: true
        storageClassName: nfs-client
        size: 2Gi
      "grafana.ini":
        server:
          root_url: https://grafana.blackcats.cc
        users:
          auto_assign_org_role: Admin
        auth:
          disable_login_form: false
        auth.generic_oauth:
          enabled: "true"
          name: Zitadel
          allow_sign_up: "true"
          client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid email profile
          auth_url: https://zitadel.blackcats.cc/oauth/v2/authorize
          token_url: https://zitadel.blackcats.cc/oauth/v2/token
          api_url: https://zitadel.blackcats.cc/oidc/v1/userinfo
          use_pkce: "true"
          auto_login: "false"
      service:
        port: 3000
      resources:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 512Mi

    # ---------------------------------------------------------------------------
    # VictoriaLogs — not enabled (future work)
    # ---------------------------------------------------------------------------
    vlogs:
      enabled: false

    vlsingle:
      enabled: false

    # ---------------------------------------------------------------------------
    # Bundled exporters
    # ---------------------------------------------------------------------------
    kube-state-metrics:
      enabled: true
      collectors:
        - pods
        - deployments
        - replicasets
        - statefulsets
        - daemonsets
        - nodes
        - namespaces
        - persistentvolumeclaims
        - horizontalpodautoscalers
        - jobs
        - cronjobs
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

    prometheus-node-exporter:
      enabled: true

    # Kubelet / API server / etcd scraping
    kubelet:
      enabled: true

    kubeApiServer:
      enabled: true
      # The apiserver /metrics endpoint is the single highest-cardinality scrape and
      # lands CPU on the control plane that is already under leader-election pressure.
      # Scrape it less often (3m) and drop the heaviest histogram buckets.
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: https
              scheme: https
              interval: "3m"
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                serverName: kubernetes
              metricRelabelConfigs:
                - action: drop
                  sourceLabels: [__name__]
                  regex: "apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_response_sizes_bucket|apiserver_request_body_size_bytes_bucket|apiserver_response_body_size_bytes_bucket|apiserver_watch_events_sizes_bucket|workqueue_queue_duration_seconds_bucket|workqueue_work_duration_seconds_bucket"
          jobLabel: component
          namespaceSelector:
            matchNames:
              - default
          selector:
            matchLabels:
              component: apiserver
              provider: kubernetes

    # Control-plane component metrics.
    # cm + scheduler are reachable: --bind-address=0.0.0.0 is set via Talos
    # extraArgs (must also be added to talconfig.yaml so it survives a
    # talhelper regen — applied imperatively 2026-06-03).
    # Talos serves cm/scheduler metrics with a cert valid only for localhost,
    # but vmagent scrapes them by node IP — so skip TLS verification.
    kubeControllerManager:
      enabled: true
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeScheduler:
      enabled: true
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    # etcd metrics: Talos serves them plaintext on :2381 via the
    # etcd.extraArgs.listen-metrics-urls set in talconfig.yaml. That arg took
    # effect after a node reboot — verified reachable on all 3 CPs 2026-06-18.
    # Unlike cm/scheduler, etcd runs outside the kubelet on Talos (no static
    # mirror pod), so the chart's pod selector finds nothing — list the
    # control-plane IPs explicitly and scrape :2381 over http (no auth/TLS).
    kubeEtcd:
      enabled: true
      endpoints:
        - 172.16.20.11
        - 172.16.20.12
        - 172.16.20.13
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - port: http-metrics
              scheme: http

    coreDns:
      enabled: true

    defaultRules:
      disabled:
        NodeNetworkTransmitErrs: true

    # Disable admission webhooks — operator validates CRs in-process without
    # webhooks; disabling avoids the chicken-and-egg where the webhook server
    # isn't ready when the operator CRs are first applied during install.
    victoria-metrics-operator:
      admissionWebhooks:
        enabled: false
