---
# Override NodeNetworkTransmitErrs to exclude WireGuard (wt0) and loopback
# interfaces. Default rule has no device exclusions; Cilium WireGuard
# encryption creates wt0 on each node with expected TX errors.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: node-network-custom
  namespace: monitoring
spec:
  groups:
    - name: node-exporter-custom
      rules:
        - alert: NodeNetworkTransmitErrs
          expr: >
            (
              rate(node_network_transmit_errs_total{job="node-exporter",device!~"lo|wt.+|veth.+|docker.+|cali.+|cilium.+"}[2m])
              / rate(node_network_transmit_packets_total{job="node-exporter",device!~"lo|wt.+|veth.+|docker.+|cali.+|cilium.+"}[2m])
            ) > 0.01
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Network interface is reporting many transmit errors.
            description: >
              {{ $labels.instance }} interface {{ $labels.device }} has encountered
              {{ printf "%.0f" $value }} transmit errors in the last two minutes.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworktransmiterrs
