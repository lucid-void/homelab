# Talos cluster definition — edit before running `talhelper genconfig`
# See design/kubernetes.md for full rationale

clusterName: homelab-k8s
endpoint: https://172.16.20.10:6443    # API VIP — floats between control planes
talosVersion: v1.13.2
kubernetesVersion: v1.36.1

cniConfig:
  name: none                            # Cilium installed post-bootstrap (Phase 9)

additionalApiServerCertSans:
  - 172.16.20.10                        # API VIP
  - 172.16.20.11                        # cp-1
  - 172.16.20.12                        # cp-2
  - 172.16.20.13                        # cp-3

controlPlane:
  patches:
    - |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/openebs/local
              type: bind
              source: /var/openebs/local
              options:
                - bind
                - rshared
                - rw
    - |-
      cluster:
        proxy:
          disabled: true
        allowSchedulingOnControlPlanes: true
        etcd:
          advertisedSubnets:
            - 172.16.20.0/24
          listenSubnets:
            - 172.16.20.0/24
          # Plaintext metrics listener for vmagent scraping (internal VLAN).
          # NOTE: takes effect only on a node reboot — Talos cannot restart
          # etcd via API. kubeEtcd scrape stays disabled until then.
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
        # Expose controller-manager + scheduler metrics off localhost so
        # vmagent can scrape :10257 / :10259 (kubeControllerManager/kubeScheduler).
        controllerManager:
          extraArgs:
            bind-address: "0.0.0.0"
        scheduler:
          extraArgs:
            bind-address: "0.0.0.0"
      machine:
        kubelet:
          nodeIP:
            validSubnets:
              - 172.16.20.0/24
    - |-
      apiVersion: v1alpha1
      kind: ExtensionServiceConfig
      name: lldpd
      configFiles:
        - content: |
            configure lldp portidsubtype ifname
            configure system description "Talos Node"
          mountPath: /usr/local/etc/lldpd/lldpd.conf
    - |-
      apiVersion: v1alpha1
      kind: ExtensionServiceConfig
      name: netbird
      environment:
        - NB_SETUP_KEY=${NB_SETUP_KEY}

nodes:
  - hostname: cp-1
    ipAddress: 172.16.20.11
    installDisk: /dev/sda
    controlPlane: true
    patches:
      - |-
        # Netbird (wt0) adds a second IP that containerd picks as the hostNetwork pod IP.
        # Without this override, kube-apiserver advertises the Netbird IP in endpoints,
        # breaking ClusterIP routing for any node where Cilium can't route Netbird IPs.
        cluster:
          apiServer:
            extraArgs:
              advertise-address: 172.16.20.11
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/lldpd
            - siderolabs/netbird
            # - siderolabs/nut-client  # NUT client is disabled on CPs to avoid potential issues with power management during cluster upgrades (e.g. if a CP reboots before draining, it could cause a brief outage)
            - siderolabs/qemu-guest-agent
    networkInterfaces:
      - interface: ens18
        addresses: [172.16.20.11/24]
        routes:
          - network: 0.0.0.0/0
            gateway: 172.16.20.254
        dhcp: false
        nameservers:
          - 172.16.20.254
        vip:
          ip: 172.16.20.10              # shared API VIP — held by whichever CP wins leader election

  - hostname: cp-2
    ipAddress: 172.16.20.12
    installDisk: /dev/sda
    controlPlane: true
    patches:
      - |-
        # See comment on k8s-cp-1 patch — same Netbird IP override needed on all CPs.
        cluster:
          apiServer:
            extraArgs:
              advertise-address: 172.16.20.12
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/lldpd
            - siderolabs/netbird
            # - siderolabs/nut-client
            - siderolabs/qemu-guest-agent
    networkInterfaces:
      - interface: ens18
        addresses: [172.16.20.12/24]
        routes:
          - network: 0.0.0.0/0
            gateway: 172.16.20.254
        dhcp: false
        nameservers:
          - 172.16.20.254
        vip:
          ip: 172.16.20.10

  - hostname: cp-3
    ipAddress: 172.16.20.13
    installDisk: /dev/sda
    controlPlane: true
    patches:
      - |-
        # See comment on k8s-cp-1 patch — same Netbird IP override needed on all CPs.
        cluster:
          apiServer:
            extraArgs:
              advertise-address: 172.16.20.13
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/lldpd
            - siderolabs/netbird
            # - siderolabs/nut-client
            - siderolabs/qemu-guest-agent
    networkInterfaces:
      - interface: ens18
        addresses: [172.16.20.13/24]
        routes:
          - network: 0.0.0.0/0
            gateway: 172.16.20.254
        dhcp: false
        nameservers:
          - 172.16.20.254
        vip:
          ip: 172.16.20.10
