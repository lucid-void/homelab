---
- name: Install nfs-common
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create NFS mount points
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: docker
    group: labops
    mode: "02775"
  loop: "{{ nfs_mounts }}"

- name: Deploy systemd mount units
  ansible.builtin.template:
    src: mount.j2
    dest: "/etc/systemd/system/{{ item.path | regex_replace('^/', '') | replace('/', '-') }}.mount"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nfs_mounts }}"
  register: _units

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: _units is changed

- name: Enable and start NFS mounts
  ansible.builtin.systemd:
    name: "{{ item.path | regex_replace('^/', '') | replace('/', '-') }}.mount"
    enabled: true
    state: started
  loop: "{{ nfs_mounts }}"
