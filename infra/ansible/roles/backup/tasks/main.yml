---
# Deploys the daily backup cron job to the DB VM (.10).
# Requires: NFS mounts already up (nfs role applied to db host first).

- name: Install rclone {{ rclone_version }} from official binary
  ansible.builtin.unarchive:
    src: "https://github.com/rclone/rclone/releases/download/v{{ rclone_version }}/rclone-v{{ rclone_version }}-linux-amd64.zip"
    dest: /tmp
    remote_src: true
    creates: "/tmp/rclone-v{{ rclone_version }}-linux-amd64/rclone"

- name: Install rclone binary to /usr/local/bin
  ansible.builtin.copy:
    src: "/tmp/rclone-v{{ rclone_version }}-linux-amd64/rclone"
    dest: /usr/local/bin/rclone
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Install postgresql-client for pg_dump
  ansible.builtin.apt:
    name: postgresql-client
    state: present

- name: Ensure /opt/scripts exists
  ansible.builtin.file:
    path: /opt/scripts
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Deploy .pgpass file
  ansible.builtin.template:
    src: pgpass.j2
    dest: /opt/scripts/.pgpass
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Deploy backup script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../scripts/backup.sh.j2"
    dest: /opt/scripts/backup.sh
    owner: root
    group: root
    mode: "0700"
  no_log: true

- name: Ensure /root/.ssh exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate backup SSH key pair on DB VM
  community.crypto.openssh_keypair:
    path: /root/.ssh/backup_id_ed25519
    type: ed25519
    comment: backup@db
    owner: root
    group: root
    mode: "0600"
    force: false
  register: _backup_keypair

- name: Authorize backup public key on Services VM
  ansible.builtin.authorized_key:
    user: void
    key: "{{ _backup_keypair.public_key }}"
    state: present
  delegate_to: services

- name: Pre-populate Services VM SSH host key in root known_hosts
  ansible.builtin.known_hosts:
    name: "172.16.20.13"
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 172.16.20.13 2>/dev/null') }}"
    state: present
    path: /root/.ssh/known_hosts

- name: Schedule daily backup cron job
  ansible.builtin.cron:
    name: homelab-daily-backup
    user: root
    minute: "0"
    hour: "3"
    job: "timeout 4h /opt/scripts/backup.sh >> /var/log/backup.log 2>&1"
    state: present
