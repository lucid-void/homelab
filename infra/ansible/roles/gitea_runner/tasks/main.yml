---
# ── Docker user — override common role's nologin for this VM only ─────────────
- name: Give docker user a shell, home directory, and docker socket access
  ansible.builtin.user:
    name: docker
    uid: "{{ docker_uid }}"
    group: labops
    groups:
      - docker
    append: true
    shell: /bin/bash
    home: /home/docker
    create_home: true
    state: present

# ── System packages ────────────────────────────────────────────────────────────
- name: Install base packages
  ansible.builtin.apt:
    name:
      - age
      - curl
      - git
      - jq
      - python3-pip
      - python3-venv
      - unzip
    state: present
    update_cache: true
    cache_valid_time: 3600

# ── OpenTofu ───────────────────────────────────────────────────────────────────
- name: Download OpenTofu binary
  ansible.builtin.get_url:
    url: "https://github.com/opentofu/opentofu/releases/download/v{{ opentofu_version }}/tofu_{{ opentofu_version }}_linux_amd64.zip"
    dest: /tmp/tofu.zip
    mode: "0644"
    force: false

- name: Install tofu binary
  ansible.builtin.unarchive:
    src: /tmp/tofu.zip
    dest: /usr/local/bin/
    remote_src: true
    include:
      - tofu
    mode: "0755"
    creates: /usr/local/bin/tofu

# ── Packer ─────────────────────────────────────────────────────────────────────
- name: Download Packer binary
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/packer/{{ packer_version }}/packer_{{ packer_version }}_linux_amd64.zip"
    dest: /tmp/packer.zip
    mode: "0644"
    force: false

- name: Install packer binary
  ansible.builtin.unarchive:
    src: /tmp/packer.zip
    dest: /usr/local/bin/
    remote_src: true
    include:
      - packer
    mode: "0755"
    creates: /usr/local/bin/packer

# ── Ansible (virtualenv to avoid PEP 668 restrictions on Debian 12+) ──────────
- name: Install ansible in virtualenv
  ansible.builtin.pip:
    name:
      - ansible
      - paramiko
    virtualenv: /opt/venv/ansible
    virtualenv_command: python3 -m venv
    state: present

- name: Link ansible binaries into /usr/local/bin
  ansible.builtin.file:
    src: /opt/venv/ansible/bin/{{ item }}
    dest: /usr/local/bin/{{ item }}
    state: link
  loop:
    - ansible
    - ansible-playbook
    - ansible-galaxy
    - ansible-vault

# ── SOPS ───────────────────────────────────────────────────────────────────────
- name: Install sops binary
  ansible.builtin.get_url:
    url: "https://github.com/getsops/sops/releases/download/v{{ sops_version }}/sops-v{{ sops_version }}.linux.amd64"
    dest: /usr/local/bin/sops
    mode: "0755"
    force: false

# ── Just ───────────────────────────────────────────────────────────────────────
- name: Download just archive
  ansible.builtin.get_url:
    url: "https://github.com/casey/just/releases/download/{{ just_version }}/just-{{ just_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: /tmp/just.tar.gz
    force: false

- name: Install just binary
  ansible.builtin.unarchive:
    src: /tmp/just.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    include:
      - just
    mode: "0755"
    creates: /usr/local/bin/just

# ── act_runner binary ──────────────────────────────────────────────────────────
- name: Install act_runner binary
  ansible.builtin.get_url:
    url: "https://gitea.com/gitea/act_runner/releases/download/v{{ act_runner_version }}/act_runner-{{ act_runner_version }}-linux-amd64"
    dest: /usr/local/bin/act_runner
    mode: "0755"
    force: false

# ── Runner working directory ───────────────────────────────────────────────────
- name: Ensure /opt/act_runner exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: labops
    mode: "02775"
  loop:
    - /opt/act_runner
    - /opt/act_runner/workdir

- name: Template act_runner config
  ansible.builtin.template:
    src: act_runner_config.yaml.j2
    dest: /opt/act_runner/config.yaml
    owner: docker
    group: labops
    mode: "0640"
  notify: restart act_runner

# ── SSH key (runner → VMs for Ansible, also used as SOPS age identity) ────────
- name: Ensure docker user .ssh directory
  ansible.builtin.file:
    path: /home/docker/.ssh
    state: directory
    owner: docker
    group: labops
    mode: "0700"

- name: Deploy runner SSH private key
  ansible.builtin.copy:
    content: "{{ runner_ssh_private_key }}"
    dest: /home/docker/.ssh/ed25519
    owner: docker
    group: labops
    mode: "0600"
  no_log: true

- name: Deploy runner SSH public key
  ansible.builtin.copy:
    content: "{{ runner_ssh_public_key }}"
    dest: /home/docker/.ssh/ed25519.pub
    owner: docker
    group: labops
    mode: "0644"

- name: Set SOPS_AGE_KEY_FILE in docker user profile
  ansible.builtin.lineinfile:
    path: /home/docker/.bashrc
    line: "export SOPS_AGE_KEY_FILE=/home/docker/.ssh/ed25519"
    create: true
    owner: docker
    group: labops
    mode: "0644"

# ── act_runner registration (idempotent — skipped if .runner already exists) ──
- name: Check if runner is already registered
  ansible.builtin.stat:
    path: /opt/act_runner/.runner
  register: _runner_registered

- name: Register act_runner with Gitea
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/act_runner register
      --no-interactive
      --config /opt/act_runner/config.yaml
      --instance https://gitea.blackcats.cc
      --token {{ gitea_runner_token }}
      --name runner
      --labels "ubuntu-latest:docker://gitea/runner-images:ubuntu-latest,self-hosted:host"
    chdir: /opt/act_runner
  environment:
    HOME: /home/docker
  become_user: docker
  when: not _runner_registered.stat.exists
  no_log: true
  changed_when: true
  notify: restart act_runner

# ── systemd service ────────────────────────────────────────────────────────────
- name: Install act_runner systemd service
  ansible.builtin.template:
    src: act_runner.service.j2
    dest: /etc/systemd/system/act_runner.service
    owner: root
    group: root
    mode: "0644"
  notify: restart act_runner

- name: Enable and start act_runner
  ansible.builtin.systemd:
    name: act_runner
    enabled: true
    state: started
    daemon_reload: true
