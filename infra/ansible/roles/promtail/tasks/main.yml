---
- name: Check installed promtail version
  ansible.builtin.command: /usr/local/bin/promtail --version
  register: _pt_installed
  failed_when: false
  changed_when: false

- name: Install promtail
  when: promtail_version not in (_pt_installed.stdout | default(''))
  block:
    - name: Download promtail binary
      ansible.builtin.get_url:
        url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
        dest: "/tmp/promtail-{{ promtail_version }}.zip"
        mode: "0644"

    - name: Ensure unzip is available
      ansible.builtin.apt:
        name: unzip
        state: present

    - name: Extract promtail
      ansible.builtin.unarchive:
        src: "/tmp/promtail-{{ promtail_version }}.zip"
        dest: /tmp
        remote_src: true

    - name: Install promtail binary
      ansible.builtin.copy:
        src: /tmp/promtail-linux-amd64
        dest: /usr/local/bin/promtail
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      notify: Restart promtail

    - name: Remove download artefacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/promtail-{{ promtail_version }}.zip"
        - /tmp/promtail-linux-amd64

- name: Ensure promtail positions directory exists
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure promtail config directory exists
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    owner: root
    group: root
    mode: "0640"
  notify: Restart promtail

- name: Deploy promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart promtail

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
