---
- name: Check Swarm state
  ansible.builtin.shell: docker info 2>/dev/null | awk '/Swarm:/ {print $2}'
  register: swarm_state
  changed_when: false

- name: Get worker join token from manager
  ansible.builtin.shell: docker swarm join-token -q worker
  register: swarm_worker_token
  delegate_to: services
  run_once: true
  changed_when: false
  when: swarm_state.stdout != 'active'

- name: Join Swarm as worker
  ansible.builtin.shell: >
    docker swarm join --token {{ swarm_worker_token.stdout }} 172.16.20.13:2377
  when: swarm_state.stdout != 'active'
