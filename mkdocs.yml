site_name: void's homelab
site_description: Production-grade self-hosted infrastructure — everything as code
site_url: https://lucid-void.github.io/homelab/

theme:
  name: material
  custom_dir: docs/overrides
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/note-16
      tip: octicons/light-bulb-16
      warning: octicons/alert-16
      danger: octicons/zap-16
      info: octicons/info-16
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.indexes
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - assets/catppuccin.css
  - assets/cards.css
  - assets/extras.css

extra_javascript:
  - assets/iframe-resize.js

plugins:
  - search
  # git-revision-date-localized disabled until repo has git history
  # - git-revision-date-localized:
  #     enable_creation_date: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - tables
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes

nav:
  - Home: index.md
  - The Stack:
    - Overview: stack/index.md
    - Network: stack/network.md
    - Compute: stack/compute.md
    - Storage: stack/storage.md
    - Services: stack/services.md
  - Automation:
    - Pipeline: automation/index.md
    - Secrets: automation/secrets.md
    - CI/CD: automation/cicd.md
  - Operations:
    - Monitoring: operations/index.md
    - Alerting: operations/alerting.md
    - Certificates: operations/certificates.md
    - Security: operations/security.md
