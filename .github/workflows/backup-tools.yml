name: Build backup-tools

on:
  push:
    branches: [main]
    paths:
      - kubernetes/images/backup-tools/**
      - .github/workflows/backup-tools.yml
  workflow_dispatch:

env:
  ALPINE_VERSION: "3.21"
  KUBECTL_VERSION: "1.32.0"
  RCLONE_VERSION: "1.68.2"
  IMAGE_VERSION: "1.0.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: lucid-void/backup-tools
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ env.IMAGE_VERSION }}
            type=raw,value=alpine${{ env.ALPINE_VERSION }}-kubectl${{ env.KUBECTL_VERSION }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kubernetes/images/backup-tools
          push: true
          platforms: linux/amd64
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            KUBECTL_VERSION=${{ env.KUBECTL_VERSION }}
            RCLONE_VERSION=${{ env.RCLONE_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
