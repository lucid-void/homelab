name: Build postgres-cnpg-immich

on:
  push:
    branches: [main]
    paths:
      - kubernetes/images/postgres-cnpg-immich/**
      - .github/workflows/postgres-cnpg-immich.yml
  workflow_dispatch:

env:
  PG_MAJOR: "17"
  PG_BASE_TAG: "bookworm"
  PGVECTOR_VERSION: "0.8.2"
  VECTORCHORD_VERSION: "1.1.1"
  IMAGE_VERSION: "1.0.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: lucid-void/postgres-cnpg-immich
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ env.IMAGE_VERSION }}
            type=raw,value=${{ env.PG_MAJOR }}-${{ env.PG_BASE_TAG }}-vectorchord${{ env.VECTORCHORD_VERSION }}-pgvector${{ env.PGVECTOR_VERSION }}
            type=raw,value=${{ env.PG_MAJOR }}-${{ env.PG_BASE_TAG }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kubernetes/images/postgres-cnpg-immich
          push: true
          platforms: linux/amd64
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            PG_BASE_TAG=${{ env.PG_BASE_TAG }}
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
            VECTORCHORD_VERSION=${{ env.VECTORCHORD_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
