name: Manifest Scan

# Validates Kubernetes manifests on any PR touching kubernetes/.
# Two checks:
#
#   kubeconform — hard gate: any schema validation error fails the PR.
#   kube-linter — delta gate: fails only if the PR *introduces* new
#                 misconfiguration violations vs. the base branch.
#                 Existing violations are shown in the PR comment but
#                 do not block merging (same philosophy as image-scan.yml).
#
# Required status check name for branch protection: "Manifest Scan Passed"

on:
  pull_request:
    paths:
      - "kubernetes/**"
      - ".github/workflows/manifest-scan.yml"
      - ".github/kube-linter-config.yaml"
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  KUBECONFORM_VERSION: "v0.7.0"
  KUBE_LINTER_VERSION: "v0.8.3"
  KUBERNETES_VERSION: "1.36.0"

jobs:
  # ── Job 1: schema validation + misconfiguration scan ─────────────────────
  scan:
    name: Scan manifests
    runs-on: ubuntu-latest
    outputs:
      kubeconform_errors: ${{ steps.kubeconform.outputs.errors }}
      kubeconform_ok:     ${{ steps.kubeconform.outputs.ok }}
      linter_base_count:  ${{ steps.linter-base.outputs.count }}
      linter_pr_count:    ${{ steps.linter-pr.outputs.count }}
      linter_delta:       ${{ steps.delta.outputs.delta }}
      linter_new_issues:  ${{ steps.delta.outputs.new_issues }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Install tools ────────────────────────────────────────────────────
      - name: Install kubeconform
        run: |
          curl -sSLf \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Install kube-linter
        run: |
          curl -sSLf \
            "https://github.com/stackrox/kube-linter/releases/download/${KUBE_LINTER_VERSION}/kube-linter-linux.tar.gz" \
            | tar -xz -C /usr/local/bin kube-linter
          chmod +x /usr/local/bin/kube-linter

      # ── kubeconform ──────────────────────────────────────────────────────
      - name: Run kubeconform
        id: kubeconform
        run: |
          set +e
          output=$(kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version "$KUBERNETES_VERSION" \
            -summary \
            -output json \
            kubernetes/ 2>&1)
          exit_code=$?

          echo "$output" > /tmp/kubeconform-output.json

          # Parse summary from JSON output
          errors=$(echo "$output" | jq -r '[.[] | select(.status == "statusError")] | length' 2>/dev/null || echo "0")
          invalid=$(echo "$output" | jq -r '[.[] | select(.status == "statusInvalid")] | length' 2>/dev/null || echo "0")
          total_errors=$(( errors + invalid ))

          if [ "$exit_code" -eq 0 ] && [ "$total_errors" -eq 0 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "errors=0" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "errors=${total_errors}" >> "$GITHUB_OUTPUT"
          fi

          # Always save detailed errors for the comment
          echo "$output" | jq -r \
            '.[] | select(.status == "statusError" or .status == "statusInvalid") | "\(.filename):\(.status): \(.msg // .err)"' \
            > /tmp/kubeconform-errors.txt 2>/dev/null || true

      # ── kube-linter on base branch ───────────────────────────────────────
      - name: Run kube-linter on base branch
        id: linter-base
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git stash --include-untracked || true
          git checkout "origin/${{ github.base_ref }}" -- kubernetes/ 2>/dev/null || true

          set +e
          kube-linter lint kubernetes/ \
            --config .github/kube-linter-config.yaml \
            --format json > /tmp/linter-base.json 2>&1
          set -e

          count=$(jq '.Reports | length' /tmp/linter-base.json 2>/dev/null || echo "0")
          echo "count=${count}" >> "$GITHUB_OUTPUT"

          # Restore PR state
          git checkout HEAD -- kubernetes/ 2>/dev/null || true
          git stash pop 2>/dev/null || true

      # ── kube-linter on PR branch ─────────────────────────────────────────
      - name: Run kube-linter on PR branch
        id: linter-pr
        run: |
          set +e
          kube-linter lint kubernetes/ \
            --config .github/kube-linter-config.yaml \
            --format json > /tmp/linter-pr.json 2>&1
          set -e

          count=$(jq '.Reports | length' /tmp/linter-pr.json 2>/dev/null || echo "0")
          echo "count=${count}" >> "$GITHUB_OUTPUT"

          # Extract list of new issues (in PR but not in base, by check+object key)
          jq -r '.Reports[] | "\(.Object.Metadata.Namespace)/\(.Object.GroupVersionKind.Kind)/\(.Object.Metadata.Name): \(.Diagnostic.Message) [\(.Check)]"' \
            /tmp/linter-pr.json 2>/dev/null | sort > /tmp/linter-pr-issues.txt || true

          jq -r '.Reports[] | "\(.Object.Metadata.Namespace)/\(.Object.GroupVersionKind.Kind)/\(.Object.Metadata.Name): \(.Diagnostic.Message) [\(.Check)]"' \
            /tmp/linter-base.json 2>/dev/null | sort > /tmp/linter-base-issues.txt || true

          comm -23 /tmp/linter-pr-issues.txt /tmp/linter-base-issues.txt > /tmp/linter-new-issues.txt || true

      # ── Compute delta ─────────────────────────────────────────────────────
      - name: Compute delta
        id: delta
        run: |
          base_count="${{ steps.linter-base.outputs.count }}"
          pr_count="${{ steps.linter-pr.outputs.count }}"
          delta=$(( pr_count - base_count ))
          echo "delta=${delta}" >> "$GITHUB_OUTPUT"

          new_issues=$(cat /tmp/linter-new-issues.txt 2>/dev/null || echo "")
          # Encode for multiline output
          {
            echo 'new_issues<<EOF'
            echo "$new_issues"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-scan-results
          retention-days: 14
          path: |
            /tmp/kubeconform-output.json
            /tmp/kubeconform-errors.txt
            /tmp/linter-base.json
            /tmp/linter-pr.json
            /tmp/linter-new-issues.txt

  # ── Job 2: gate + PR comment ──────────────────────────────────────────────
  manifest-scan-passed:
    name: Manifest Scan Passed
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: always()

    steps:
      - name: Build and post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          KUBECONFORM_OK:    ${{ needs.scan.outputs.kubeconform_ok }}
          KUBECONFORM_ERRS:  ${{ needs.scan.outputs.kubeconform_errors }}
          LINTER_BASE:       ${{ needs.scan.outputs.linter_base_count }}
          LINTER_PR:         ${{ needs.scan.outputs.linter_pr_count }}
          LINTER_DELTA:      ${{ needs.scan.outputs.linter_delta }}
          LINTER_NEW:        ${{ needs.scan.outputs.linter_new_issues }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          REPO:              ${{ github.repository }}
        run: |
          kubeconform_icon="✅"
          [ "$KUBECONFORM_OK" = "false" ] && kubeconform_icon="❌"

          linter_icon="✅"
          [ "${LINTER_DELTA:-0}" -gt 0 ] 2>/dev/null && linter_icon="❌"

          delta_str="${LINTER_DELTA:-0}"
          [ "${LINTER_DELTA:-0}" -gt 0 ] 2>/dev/null && delta_str="+${LINTER_DELTA}"

          new_issues_section=""
          if [ -n "$LINTER_NEW" ]; then
            new_issues_section=$(printf "\n<details>\n<summary>New violations introduced by this PR</summary>\n\n\`\`\`\n%s\n\`\`\`\n\n</details>" "$LINTER_NEW")
          fi

          body=$(cat <<COMMENT
          <!-- manifest-scan-result -->
          ## Manifest Scan Results

          | Check | Result | Detail |
          |---|---|---|
          | kubeconform | ${kubeconform_icon} | ${KUBECONFORM_ERRS} schema error(s) |
          | kube-linter | ${linter_icon} | base: ${LINTER_BASE} → PR: ${LINTER_PR} (${delta_str}) |
          ${new_issues_section}
          COMMENT
          )

          # Upsert comment (delete previous manifest-scan comment if present)
          existing_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- manifest-scan-result -->")) | .id' 2>/dev/null || echo "")
          if [ -n "$existing_id" ]; then
            gh api --method DELETE "repos/${REPO}/issues/comments/${existing_id}" || true
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"

      - name: Gate
        env:
          KUBECONFORM_OK: ${{ needs.scan.outputs.kubeconform_ok }}
          LINTER_DELTA:   ${{ needs.scan.outputs.linter_delta }}
        run: |
          failed=false

          if [ "$KUBECONFORM_OK" = "false" ]; then
            echo "❌ kubeconform found schema errors — fix before merging."
            failed=true
          else
            echo "✅ kubeconform passed."
          fi

          if [ "${LINTER_DELTA:-0}" -gt 0 ] 2>/dev/null; then
            echo "❌ kube-linter: ${LINTER_DELTA} new violation(s) introduced — fix before merging."
            failed=true
          else
            echo "✅ kube-linter: no new violations introduced."
          fi

          [ "$failed" = "true" ] && exit 1 || exit 0
