name: Image Security Scan

# Triggered by any PR that touches a stack compose file.
# Renovate PRs hit this automatically; manual image bumps do too.
#
# Failure thresholds (tune here):
#   GRYPE_FAIL_SEVERITY  — grype exits non-zero if any vuln >= this level is found
#   OSV_FAIL_SEVERITY    — osv-scanner JSON is parsed; job fails on this severity or higher
#
# To enforce these as a merge gate, add "Image Scans Passed" as a required
# status check in GitHub → Settings → Branches → Branch protection rules.

on:
  pull_request:
    paths:
      - "stacks/**/compose.yaml"
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  SYFT_VERSION: "1.18.1"
  GRYPE_VERSION: "0.87.0"
  OSV_SCANNER_VERSION: "1.9.2"
  GRYPE_FAIL_SEVERITY: "critical"
  OSV_FAIL_SEVERITY: "CRITICAL"

jobs:
  # ── Job 1: detect which images changed in this PR ──────────────────────────
  detect-images:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}
      has-images: ${{ steps.extract.outputs.has_images }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changed images from diff
        id: extract
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          IMAGES=$(git diff "origin/${{ github.base_ref }}...HEAD" \
            -- 'stacks/**/compose.yaml' \
            | grep -E '^\+[^+]' \
            | grep -E 'image:' \
            | sed 's/.*image:[[:space:]]*//' \
            | sed 's/[[:space:]]*$//' \
            | grep -v '^$' \
            | sort -u)

          if [ -z "$IMAGES" ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"image\":[]}" >> "$GITHUB_OUTPUT"
            echo "No image changes detected — scan skipped"
          else
            JSON=$(printf '%s\n' "$IMAGES" | jq -R . | jq -sc '{image: .}')
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "Images to scan:"
            printf '%s\n' "$IMAGES"
          fi

  # ── Job 2: scan each image (matrix, parallel) ──────────────────────────────
  scan:
    name: Scan ${{ matrix.image }}
    needs: detect-images
    if: needs.detect-images.outputs.has-images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install syft, grype, osv-scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${SYFT_VERSION}"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Generate SBOM (syft)
        run: |
          IMAGE="${{ matrix.image }}"
          SAFE="${IMAGE//[\/:.@]/_}"
          echo "SAFE=$SAFE" >> "$GITHUB_ENV"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

          syft "$IMAGE" -o cyclonedx-json="sbom-${SAFE}.cdx.json"

      - name: Vulnerability scan — grype
        id: grype
        run: |
          # Table output for the step summary, JSON for the artifact
          grype "sbom:sbom-${SAFE}.cdx.json" \
            --fail-on "$GRYPE_FAIL_SEVERITY" \
            -o json > "grype-${SAFE}.json" 2>&1
          GRYPE_EXIT=$?

          echo "GRYPE_EXIT=$GRYPE_EXIT" >> "$GITHUB_ENV"

          # Human-readable count for the summary
          CRIT=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' \
            "grype-${SAFE}.json")
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' \
            "grype-${SAFE}.json")
          echo "GRYPE_CRIT=$CRIT" >> "$GITHUB_ENV"
          echo "GRYPE_HIGH=$HIGH" >> "$GITHUB_ENV"

          exit $GRYPE_EXIT
        continue-on-error: true

      - name: Vulnerability scan — osv-scanner
        id: osv
        run: |
          osv-scanner \
            --sbom "sbom-${SAFE}.cdx.json" \
            --format json > "osv-${SAFE}.json" 2>&1 || true

          CRITICAL_COUNT=$(jq \
            '[.results[]?.packages[]?.vulnerabilities[]?
               | select(.database_specific?.severity == "'"$OSV_FAIL_SEVERITY"'")] | length' \
            "osv-${SAFE}.json" 2>/dev/null || echo "0")

          echo "OSV_CRIT=$CRITICAL_COUNT" >> "$GITHUB_ENV"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "OSV_FAILED=true" >> "$GITHUB_ENV"
          else
            echo "OSV_FAILED=false" >> "$GITHUB_ENV"
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Scan results: \`$IMAGE\`"
            echo ""
            echo "| Tool | Critical | High | Gate |"
            echo "|------|----------|------|------|"

            GRYPE_GATE="✅ pass"
            [ "${GRYPE_EXIT:-0}" != "0" ] && GRYPE_GATE="❌ fail"
            echo "| grype | ${GRYPE_CRIT:-?} | ${GRYPE_HIGH:-?} | $GRYPE_GATE |"

            OSV_GATE="✅ pass"
            [ "${OSV_FAILED}" = "true" ] && OSV_GATE="❌ fail (${OSV_CRIT} critical)"
            echo "| osv-scanner | ${OSV_CRIT:-0} | — | $OSV_GATE |"

            echo ""
            echo "### grype findings (table)"
            echo '```'
            grype "sbom:sbom-${SAFE}.cdx.json" -o table 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-${{ env.SAFE }}
          path: |
            sbom-*.cdx.json
            grype-*.json
            osv-*.json
          retention-days: 30

      - name: Enforce thresholds
        run: |
          FAILED=false
          if [ "${GRYPE_EXIT:-0}" != "0" ]; then
            echo "grype: found ${GRYPE_CRIT} CRITICAL vulnerabilities (threshold: ${GRYPE_FAIL_SEVERITY})"
            FAILED=true
          fi
          if [ "${OSV_FAILED}" = "true" ]; then
            echo "osv-scanner: found ${OSV_CRIT} CRITICAL vulnerabilities"
            FAILED=true
          fi
          if [ "$FAILED" = "true" ]; then
            exit 1
          fi

  # ── Job 3: single required gate for branch protection ──────────────────────
  # Add "Image Scans Passed" as a required status check in branch settings.
  image-scans-passed:
    name: Image Scans Passed
    needs: [detect-images, scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check scan results
        run: |
          DETECT="${{ needs.detect-images.result }}"
          SCAN="${{ needs.scan.result }}"

          echo "detect-images: $DETECT"
          echo "scan: $SCAN"

          # Skipped is OK (no image changes in this PR)
          if [[ "$DETECT" != "success" ]]; then
            echo "detect-images job did not succeed"
            exit 1
          fi
          if [[ "$SCAN" != "success" && "$SCAN" != "skipped" ]]; then
            echo "One or more image scans failed — see individual scan jobs above"
            exit 1
          fi
          echo "All image scans passed (or no image changes to scan)"
