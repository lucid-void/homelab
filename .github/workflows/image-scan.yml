name: Image Security Scan

# Triggered by any PR that touches a stack compose file.
# Renovate PRs hit this automatically; manual image bumps do too.
#
# Failure thresholds (tune here):
#   GRYPE_FAIL_SEVERITY  — grype exits non-zero if any vuln >= this level is found
#   OSV_FAIL_SEVERITY    — osv-scanner JSON is parsed; job fails on this severity or higher
#
# To enforce these as a merge gate, add "Image Scans Passed" as a required
# status check in GitHub → Settings → Branches → Branch protection rules.

on:
  pull_request:
    paths:
      - "stacks/**/compose.yaml"
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  SYFT_VERSION: "1.18.1"
  GRYPE_VERSION: "0.87.0"
  OSV_SCANNER_VERSION: "1.9.2"
  GRYPE_FAIL_SEVERITY: "critical"   # grype --fail-on value: critical / high / medium / low
  OSV_FAIL_SEVERITY: "CRITICAL"     # ALL CAPS: CRITICAL / HIGH / MEDIUM

jobs:
  # ── Job 1: detect which images changed in this PR ──────────────────────────
  detect-images:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}
      has-images: ${{ steps.extract.outputs.has_images }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changed images from diff
        id: extract
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          IMAGES=$(git diff "origin/${{ github.base_ref }}...HEAD" \
            -- 'stacks/**/compose.yaml' \
            | grep -E '^\+[^+]' \
            | grep -E 'image:' \
            | sed 's/.*image:[[:space:]]*//' \
            | sed 's/[[:space:]]*$//' \
            | grep -v '^$' \
            | sort -u)

          if [ -z "$IMAGES" ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"image\":[]}" >> "$GITHUB_OUTPUT"
            echo "No image changes detected — scan skipped"
          else
            JSON=$(printf '%s\n' "$IMAGES" | jq -R . | jq -sc '{image: .}')
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "Images to scan:"
            printf '%s\n' "$IMAGES"
          fi

  # ── Job 2: scan each image (matrix, parallel) ──────────────────────────────
  scan:
    name: Scan ${{ matrix.image }}
    needs: detect-images
    if: needs.detect-images.outputs.has-images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install syft, grype, osv-scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${SYFT_VERSION}"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Prepare output directory
        run: |
          IMAGE="${{ matrix.image }}"
          SAFE="${IMAGE//[\/:.@]/_}"
          echo "SAFE=$SAFE" >> "$GITHUB_ENV"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          mkdir -p "scan-${SAFE}"

      - name: Generate SBOM (syft)
        run: |
          syft "$IMAGE" -o cyclonedx-json="scan-${SAFE}/sbom.cdx.json"

      - name: Vulnerability scan — grype
        run: |
          # Capture exit code without triggering set -e on non-zero exit.
          # Stderr is kept separate so grype.json stays valid JSON.
          grype "sbom:scan-${SAFE}/sbom.cdx.json" \
            --fail-on "$GRYPE_FAIL_SEVERITY" \
            -o json > "scan-${SAFE}/grype.json" 2>"scan-${SAFE}/grype.stderr" \
            && GRYPE_EXIT=0 || GRYPE_EXIT=$?

          CRIT=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' \
            "scan-${SAFE}/grype.json" 2>/dev/null || echo 0)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")]    | length' \
            "scan-${SAFE}/grype.json" 2>/dev/null || echo 0)
          MED=$(jq  '[.matches[] | select(.vulnerability.severity == "Medium")]  | length' \
            "scan-${SAFE}/grype.json" 2>/dev/null || echo 0)
          LOW=$(jq  '[.matches[] | select(.vulnerability.severity | test("Low|Negligible"))] | length' \
            "scan-${SAFE}/grype.json" 2>/dev/null || echo 0)

          echo "GRYPE_EXIT=$GRYPE_EXIT" >> "$GITHUB_ENV"
          echo "GRYPE_CRIT=$CRIT"       >> "$GITHUB_ENV"
          echo "GRYPE_HIGH=$HIGH"       >> "$GITHUB_ENV"
          echo "GRYPE_MED=$MED"         >> "$GITHUB_ENV"
          echo "GRYPE_LOW=$LOW"         >> "$GITHUB_ENV"

      - name: Vulnerability scan — osv-scanner
        run: |
          osv-scanner \
            --sbom "scan-${SAFE}/sbom.cdx.json" \
            --format json > "scan-${SAFE}/osv.json" 2>"scan-${SAFE}/osv.stderr" || true

          CRIT=$(jq '[.results[]?.packages[]?.vulnerabilities[]?
                       | select(.database_specific?.severity == "CRITICAL")] | length' \
            "scan-${SAFE}/osv.json" 2>/dev/null || echo 0)
          HIGH=$(jq '[.results[]?.packages[]?.vulnerabilities[]?
                       | select(.database_specific?.severity == "HIGH")] | length' \
            "scan-${SAFE}/osv.json" 2>/dev/null || echo 0)

          echo "OSV_CRIT=$CRIT"                                   >> "$GITHUB_ENV"
          echo "OSV_HIGH=$HIGH"                                   >> "$GITHUB_ENV"
          echo "OSV_FAILED=$([ "$CRIT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_ENV"

      - name: Save scan metadata
        if: always()
        run: |
          jq -n \
            --arg     image      "$IMAGE" \
            --argjson grype_exit "${GRYPE_EXIT:-0}" \
            --argjson grype_crit "${GRYPE_CRIT:-0}" \
            --argjson grype_high "${GRYPE_HIGH:-0}" \
            --argjson grype_med  "${GRYPE_MED:-0}"  \
            --argjson grype_low  "${GRYPE_LOW:-0}"  \
            --argjson osv_crit   "${OSV_CRIT:-0}"   \
            --argjson osv_high   "${OSV_HIGH:-0}"   \
            --arg     osv_failed "${OSV_FAILED:-false}" \
            '{
              image:      $image,
              grype_exit: $grype_exit,
              grype_crit: $grype_crit,  grype_high: $grype_high,
              grype_med:  $grype_med,   grype_low:  $grype_low,
              osv_crit:   $osv_crit,    osv_high:   $osv_high,
              osv_failed: ($osv_failed == "true")
            }' > "scan-${SAFE}/meta.json"

      - name: Write step summary
        if: always()
        run: |
          GATE="✅ Pass"
          if [ "${GRYPE_EXIT:-0}" != "0" ] || [ "${OSV_FAILED}" = "true" ]; then
            GATE="❌ Fail"
          fi
          {
            echo "## \`${IMAGE}\` — ${GATE}"
            echo ""
            echo "| Tool | Critical | High | Medium | Low/Negligible |"
            echo "|------|----------|------|--------|----------------|"
            echo "| grype | ${GRYPE_CRIT:-?} | ${GRYPE_HIGH:-?} | ${GRYPE_MED:-?} | ${GRYPE_LOW:-?} |"
            echo "| osv-scanner | ${OSV_CRIT:-?} | ${OSV_HIGH:-?} | — | — |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-${{ env.SAFE }}
          path: scan-${{ env.SAFE }}/
          retention-days: 30

      - name: Enforce thresholds
        run: |
          FAILED=false
          if [ "${GRYPE_EXIT:-0}" != "0" ]; then
            echo "grype: ${GRYPE_CRIT} Critical findings (threshold: ${GRYPE_FAIL_SEVERITY})"
            FAILED=true
          fi
          if [ "${OSV_FAILED}" = "true" ]; then
            echo "osv-scanner: ${OSV_CRIT} Critical findings"
            FAILED=true
          fi
          [ "$FAILED" = "true" ] && exit 1 || echo "Scans passed"

  # ── Job 3: post PR comment + single gate for branch protection ─────────────
  # Add "Image Scans Passed" as a required status check in GitHub branch settings.
  image-scans-passed:
    name: Image Scans Passed
    needs: [detect-images, scan]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-*
          merge-multiple: false
        continue-on-error: true   # no artifacts when has-images == false

      - name: Build and post PR comment
        if: needs.detect-images.outputs.has-images == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          OVERALL_PASS=true

          {
            echo "## 🔍 Image Security Scan Results"
            echo ""

            for dir in scan-*/; do
              [ -f "${dir}meta.json" ] || continue

              IMAGE=$(jq -r   '.image'       "${dir}meta.json")
              GRYPE_EXIT=$(jq  '.grype_exit'  "${dir}meta.json")
              GRYPE_CRIT=$(jq  '.grype_crit'  "${dir}meta.json")
              GRYPE_HIGH=$(jq  '.grype_high'  "${dir}meta.json")
              GRYPE_MED=$(jq   '.grype_med'   "${dir}meta.json")
              GRYPE_LOW=$(jq   '.grype_low'   "${dir}meta.json")
              OSV_CRIT=$(jq    '.osv_crit'    "${dir}meta.json")
              OSV_HIGH=$(jq    '.osv_high'    "${dir}meta.json")
              OSV_FAILED=$(jq  '.osv_failed'  "${dir}meta.json")

              IMAGE_PASS=true
              [ "$GRYPE_EXIT" != "0" ]       && IMAGE_PASS=false
              [ "$OSV_FAILED" = "true" ]     && IMAGE_PASS=false
              [ "$IMAGE_PASS" = "false" ]    && OVERALL_PASS=false

              BADGE="✅ Pass"
              [ "$IMAGE_PASS" = "false" ] && BADGE="❌ Fail"

              echo "### \`${IMAGE}\` — ${BADGE}"
              echo ""

              # ── Summary counts table ───────────────────────────────────────
              printf '| Tool | Critical | High | Medium | Low / Negligible |\n'
              printf '|------|----------|------|--------|------------------|\n'
              printf '| grype | %s | %s | %s | %s |\n' \
                "$GRYPE_CRIT" "$GRYPE_HIGH" "$GRYPE_MED" "$GRYPE_LOW"
              printf '| osv-scanner | %s | %s | — | — |\n' "$OSV_CRIT" "$OSV_HIGH"
              echo ""

              # ── Grype: Critical + High findings ───────────────────────────
              if [ -f "${dir}grype.json" ]; then
                GRYPE_ROWS=$(jq -r '
                  .matches[]
                  | select(.vulnerability.severity | test("Critical|High"))
                  | [
                      .artifact.name,
                      .artifact.version,
                      .vulnerability.id,
                      .vulnerability.severity,
                      (.artifact.type // "unknown")
                    ]
                  | @tsv
                ' "${dir}grype.json" 2>/dev/null \
                  | sort -t$'\t' -k4,4 \
                  | head -50)

                if [ -n "$GRYPE_ROWS" ]; then
                  TOTAL=$(jq '.matches | length' "${dir}grype.json" 2>/dev/null || echo 0)
                  SHOWN=$(echo "$GRYPE_ROWS" | wc -l)
                  echo "<details>"
                  echo "<summary>grype — Critical / High findings (${GRYPE_CRIT} critical, ${GRYPE_HIGH} high)</summary>"
                  echo ""
                  printf '| Package | Installed | Vulnerability | Severity | Type |\n'
                  printf '|---------|-----------|---------------|----------|------|\n'
                  while IFS=$'\t' read -r pkg ver vuln sev typ; do
                    printf '| `%s` | %s | %s | **%s** | %s |\n' \
                      "$pkg" "$ver" "$vuln" "$sev" "$typ"
                  done <<< "$GRYPE_ROWS"
                  REST=$(( TOTAL - SHOWN ))
                  [ "$REST" -gt 0 ] && \
                    printf '\n_…and %d lower-severity findings — download the scan artifact for the full report._\n' "$REST"
                  echo ""
                  echo "</details>"
                else
                  echo "**grype:** no Critical or High findings."
                fi
              fi

              echo ""

              # ── OSV Scanner: Critical + High findings ─────────────────────
              if [ -f "${dir}osv.json" ]; then
                OSV_ROWS=$(jq -r '
                  .results[]?.packages[]?
                  | .package as $pkg
                  | .vulnerabilities[]?
                  | select(.database_specific?.severity | test("CRITICAL|HIGH"))
                  | [
                      $pkg.name,
                      $pkg.version,
                      (if .aliases and (.aliases | length) > 0
                       then .aliases[0] else .id end),
                      (.database_specific?.severity // "UNKNOWN"),
                      $pkg.ecosystem
                    ]
                  | @tsv
                ' "${dir}osv.json" 2>/dev/null \
                  | sort -t$'\t' -k4,4 \
                  | head -50)

                if [ -n "$OSV_ROWS" ]; then
                  echo "<details>"
                  echo "<summary>osv-scanner — Critical / High findings (${OSV_CRIT} critical, ${OSV_HIGH} high)</summary>"
                  echo ""
                  printf '| Package | Installed | Vulnerability | Severity | Ecosystem |\n'
                  printf '|---------|-----------|---------------|----------|-----------|\n'
                  while IFS=$'\t' read -r pkg ver vuln sev eco; do
                    printf '| `%s` | %s | %s | **%s** | %s |\n' \
                      "$pkg" "$ver" "$vuln" "$sev" "$eco"
                  done <<< "$OSV_ROWS"
                  echo ""
                  echo "</details>"
                else
                  echo "**osv-scanner:** no Critical or High findings."
                fi
              fi

              echo ""
              echo "---"
              echo ""
            done

            # ── Overall verdict ────────────────────────────────────────────────
            if [ "$OVERALL_PASS" = "true" ]; then
              echo "**Result: ✅ All image scans passed.**"
            else
              echo "**Result: ❌ One or more images exceeded the threshold — merge blocked.**"
            fi

          } > /tmp/pr-comment.md

          # Update the last bot comment if one exists, otherwise create a new one.
          gh pr comment "$PR_NUM" --repo "$REPO" \
            --edit-last --body-file /tmp/pr-comment.md 2>/dev/null \
            || gh pr comment "$PR_NUM" --repo "$REPO" \
                 --body-file /tmp/pr-comment.md

      - name: Gate check
        run: |
          DETECT="${{ needs.detect-images.result }}"
          SCAN="${{ needs.scan.result }}"

          echo "detect-images: $DETECT"
          echo "scan:          $SCAN"

          if [[ "$DETECT" != "success" ]]; then
            echo "detect-images job did not succeed"
            exit 1
          fi
          # skipped = no image changes in this PR, which is fine
          if [[ "$SCAN" != "success" && "$SCAN" != "skipped" ]]; then
            echo "One or more image scans failed — see the PR comment for details"
            exit 1
          fi
          echo "All image scans passed (or no image changes to scan)"
